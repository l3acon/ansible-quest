<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ansible Quest — The Medieval Realm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Cinzel', 'Georgia', serif;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
}

#aspect-ratio-container {
    position: relative;
    aspect-ratio: 16/9;
    width: min(100vw, 177.78vh);
    height: auto;
    overflow: hidden;
}

/* Header */
#realm-header {
    position: absolute;
    top: 3vh;
    left: 0;
    width: 100%;
    z-index: 4;
    pointer-events: none;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: opacity 0.4s ease;
}

#realm-header .realm-icon {
    width: 3.5vw;
    height: 3.5vw;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5vw;
    margin-right: 0.8vw;
    flex-shrink: 0;
    filter: drop-shadow(0 0 8px rgba(255, 180, 50, 0.6));
}

#realm-header .realm-title {
    color: #ffd700;
    font-size: 2.8vw;
    font-weight: 900;
    letter-spacing: 4px;
    text-shadow: 0 0 30px rgba(255, 180, 50, 0.5), 0 2px 8px rgba(0, 0, 0, 0.8);
    font-family: 'Cinzel', serif;
}

#realm-header .realm-divider {
    color: rgba(255, 215, 0, 0.3);
    font-size: 2.2vw;
    font-weight: 300;
    margin: 0 1vw;
}

#realm-header .realm-subtitle {
    color: rgba(255, 220, 150, 0.65);
    font-size: 1.1vw;
    font-weight: 400;
    letter-spacing: 1px;
    font-family: 'MedievalSharp', cursive;
}

#realm-header.hidden {
    opacity: 0;
    pointer-events: none;
}

/* 3D Scene */
#kingdom-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
}

#kingdom-container canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
    cursor: grab;
}

#kingdom-container canvas:active {
    cursor: grabbing;
}

/* Main Content / Landing */
#mainContent {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    width: 100%;
    height: 100%;
    z-index: 3;
}

#landingPage {
    width: 100%;
    height: 100%;
    display: flex;
    pointer-events: none;
    flex-direction: row;
    justify-content: center;
    align-items: flex-end;
    gap: 24px;
    padding-bottom: 15.3vh;
    opacity: 1;
    transition: opacity 0.4s ease;
}

#landingPage.hidden,
#landingPage.hidden .realmOption {
    opacity: 0;
    pointer-events: none;
}

#landingPage.hidden ~ #landing-bottom-bar {
    opacity: 0;
    pointer-events: none;
}

#landing-bottom-bar {
    position: absolute;
    bottom: 5vh;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 16px;
    pointer-events: auto;
    z-index: 5;
    transition: opacity 0.4s ease;
}

#guilds-btn, #explore-btn {
    padding: 8px 22px;
    background: rgba(30, 20, 10, 0.75);
    border: 1px solid rgba(255, 200, 80, 0.25);
    border-radius: 4px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: rgba(255, 220, 150, 0.85);
    font-size: 0.95vw;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: background 0.25s, border-color 0.25s, color 0.25s, transform 0.15s;
    white-space: nowrap;
    text-transform: uppercase;
    font-family: 'Cinzel', serif;
}
#explore-btn:hover { background: rgba(60, 30, 10, 0.85); border-color: rgba(255, 140, 40, 0.5); }

#explore-hud {
    position: absolute;
    top: 2vh;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    transition: opacity 0.4s ease;
}
#explore-hud.hidden { opacity: 0; pointer-events: none; }
#explore-hud-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 28px;
    background: rgba(20, 12, 5, 0.85);
    border: 1px solid rgba(255, 170, 50, 0.3);
    border-radius: 6px;
    backdrop-filter: blur(10px);
    font-family: 'Cinzel', serif;
    color: #ffd700;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
}
.explore-keys {
    font-family: 'MedievalSharp', cursive;
    font-size: 11px;
    color: rgba(255, 220, 150, 0.6);
    letter-spacing: 1px;
    font-weight: 400;
}
#kill-counter {
    position: absolute;
    top: 2vh;
    right: 3vw;
    z-index: 10;
    padding: 10px 22px;
    background: rgba(20, 12, 5, 0.85);
    border: 1px solid rgba(255, 60, 30, 0.4);
    border-radius: 6px;
    backdrop-filter: blur(10px);
    font-family: 'Cinzel', serif;
    color: #ff4444;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 8px rgba(255, 50, 20, 0.5);
    transition: opacity 0.4s ease, transform 0.15s ease;
}
#kill-counter.hidden { opacity: 0; pointer-events: none; }
#kill-counter .kill-label {
    font-size: 10px;
    color: rgba(255, 180, 120, 0.6);
    letter-spacing: 3px;
    display: block;
    margin-bottom: 2px;
}
#kill-counter .kill-num {
    font-size: 28px;
    color: #ffd700;
    text-shadow: 0 0 12px rgba(255, 200, 50, 0.5);
}
#kill-counter .kill-pts {
    font-size: 11px;
    color: rgba(255, 220, 150, 0.5);
    display: block;
    margin-top: 2px;
    letter-spacing: 1px;
}
#kill-counter.bump { transform: scale(1.15); }
#kill-flash {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 11;
    font-family: 'Cinzel', serif;
    font-size: 32px;
    font-weight: 800;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255, 100, 20, 0.8), 0 2px 4px rgba(0,0,0,0.6);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.4s ease;
}
#health-bar-wrap {
    position: absolute;
    top: 2vh;
    left: 3vw;
    z-index: 10;
    width: 180px;
    transition: opacity 0.4s ease;
}
#health-bar-wrap.hidden { opacity: 0; pointer-events: none; }
#health-bar-wrap .hb-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: rgba(255, 180, 120, 0.6);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 4px;
}
#health-bar-outer {
    width: 100%;
    height: 14px;
    background: rgba(20, 12, 5, 0.85);
    border: 1px solid rgba(255, 60, 30, 0.4);
    border-radius: 3px;
    overflow: hidden;
}
#health-bar-inner {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #cc2222, #ff4444);
    border-radius: 2px;
    transition: width 0.15s ease;
    box-shadow: 0 0 8px rgba(255, 50, 20, 0.4);
}
#damage-flash {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(200, 0, 0, 0.35);
    pointer-events: none;
    z-index: 12;
    opacity: 0;
    transition: opacity 0.15s ease;
}
#death-screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10, 0, 0, 0.92);
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
}
#death-screen.visible { opacity: 1; pointer-events: auto; }
#death-screen .death-title {
    font-family: 'Cinzel', serif;
    font-size: 64px;
    font-weight: 800;
    color: #cc0000;
    text-shadow: 0 0 30px rgba(200, 0, 0, 0.6), 0 4px 8px rgba(0, 0, 0, 0.8);
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 30px;
}
#death-screen .death-restart {
    font-family: 'MedievalSharp', cursive;
    font-size: 22px;
    color: #ffd700;
    cursor: pointer;
    padding: 12px 36px;
    border: 1px solid rgba(255, 200, 80, 0.4);
    border-radius: 6px;
    background: rgba(40, 20, 5, 0.8);
    transition: all 0.2s ease;
    letter-spacing: 2px;
}
#death-screen .death-restart:hover {
    background: rgba(60, 30, 10, 0.9);
    border-color: rgba(255, 200, 80, 0.7);
    transform: scale(1.05);
}

#guilds-btn:hover {
    background: rgba(60, 40, 15, 0.85);
    border-color: rgba(255, 200, 80, 0.5);
    color: #ffd700;
    transform: scale(1.05);
}

#compass-btn {
    width: 48px;
    height: 48px;
    cursor: pointer;
    opacity: 0.85;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
    transition: opacity 0.4s, filter 0.3s;
    flex-shrink: 0;
}

#compass-btn:hover {
    opacity: 1;
    filter: drop-shadow(0 2px 10px rgba(255,180,50,0.4));
}

#compass-btn svg { transition: transform 0.15s ease-out; }

#audio-controls {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 30;
    display: flex;
    gap: 6px;
}
#audio-controls button {
    width: 32px;
    height: 32px;
    border: 1px solid rgba(255, 200, 80, 0.25);
    border-radius: 5px;
    background: rgba(20, 12, 5, 0.7);
    color: #ffd700;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    backdrop-filter: blur(6px);
    padding: 0;
    line-height: 1;
}
#audio-controls button:hover {
    background: rgba(40, 25, 10, 0.85);
    border-color: rgba(255, 200, 80, 0.5);
}
#audio-controls button.muted {
    color: rgba(255, 215, 0, 0.3);
    border-color: rgba(255, 200, 80, 0.1);
}

.realmOption {
    pointer-events: auto;
    width: 200px;
    height: 70px;
    background: rgba(20, 15, 8, 0.75);
    border: 1px solid rgba(255, 200, 80, 0.2);
    border-radius: 6px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: opacity 0.4s ease, transform 0.3s ease, background 0.3s ease, border-color 0.3s ease;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    box-sizing: border-box;
    gap: 2px;
}

.realmOption .realm-emoji {
    font-size: 18px;
    line-height: 1;
}

.realmOption .realm-label {
    color: #fff;
    font-size: 14px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-family: 'Cinzel', serif;
    line-height: 1.2;
    white-space: nowrap;
}

.realmOption:hover {
    transform: scale(1.05);
    background: rgba(40, 30, 12, 0.8);
}

#village {
    border-color: rgba(45, 106, 79, 0.4);
}
#village .realm-label {
    text-shadow: 0 0 20px #2d6a4f, 0 0 40px rgba(45, 106, 79, 0.3);
    color: #74c69d;
}
#village:hover {
    border-color: rgba(45, 106, 79, 0.7);
    background: rgba(45, 106, 79, 0.15);
}

#township {
    border-color: rgba(123, 44, 191, 0.4);
}
#township .realm-label {
    text-shadow: 0 0 20px #7b2cbf, 0 0 40px rgba(123, 44, 191, 0.3);
    color: #c77dff;
}
#township:hover {
    border-color: rgba(123, 44, 191, 0.7);
    background: rgba(123, 44, 191, 0.15);
}

#fortress {
    border-color: rgba(157, 2, 8, 0.4);
}
#fortress .realm-label {
    text-shadow: 0 0 20px #9d0208, 0 0 40px rgba(157, 2, 8, 0.3);
    color: #e5383b;
}
#fortress:hover {
    border-color: rgba(157, 2, 8, 0.7);
    background: rgba(157, 2, 8, 0.15);
}

/* Fullscreen Button */
#go-fullscreen {
    position: absolute;
    z-index: 1000;
    left: 52%;
    top: 19%;
    width: 8%;
    height: 10%;
    background-color: rgba(255, 255, 255, 0);
    border: unset;
    cursor: pointer;
}

/* Page Heading */
#page-heading {
    position: absolute;
    top: 2.5vh;
    left: 2.5vw;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    display: flex;
    align-items: center;
    gap: 0.8vw;
}

#page-heading.visible { opacity: 1; }

#page-heading .heading-icon {
    font-size: 3vh;
    filter: drop-shadow(0 0 6px rgba(255, 180, 50, 0.5));
}

#page-heading .heading-title {
    color: #ffd700;
    font-size: 2.2vw;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
    font-family: 'Cinzel', serif;
}

/* Main Menu */
#main-menu {
    position: absolute;
    top: 30%;
    left: 2.6%;
    z-index: 10;
    color: #fff;
    text-align: center;
    transform: translateX(calc(-100% - 2.6vw));
    transition: transform 0.4s ease;
    height: auto;
    width: 17%;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

#main-menu.visible { transform: translateX(0); }

.menu-item-text {
    width: 100%;
    color: rgba(255, 220, 150, 0.9);
    font-size: 1.05vw;
    font-weight: 700;
    padding: 1.4vh 1vw;
    line-height: 1.3;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
    background-color: rgba(30, 20, 10, 0.7);
    border: 1px solid rgba(255, 200, 80, 0.15);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.15s ease, color 0.15s;
    font-family: 'MedievalSharp', cursive;
    text-align: left;
}

.menu-item-text:hover {
    background-color: rgba(60, 40, 15, 0.85);
    border-color: rgba(255, 200, 80, 0.35);
    transform: scale(1.03);
    color: #ffd700;
}

.menu-item-text.on {
    background-color: rgba(80, 50, 15, 0.9);
    border-color: rgba(255, 200, 80, 0.5);
    color: #ffd700;
}

/* Guild Menu */
#guild-heading {
    position: absolute;
    top: 2.5vh;
    left: 2.5vw;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    display: flex;
    align-items: center;
    gap: 0.8vw;
}

#guild-heading.visible { opacity: 1; }

#guild-heading .heading-title {
    color: #ffd700;
    font-size: 2.2vw;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
    font-family: 'Cinzel', serif;
}

#guild-menu {
    position: absolute;
    top: 30%;
    left: 2.6%;
    z-index: 10;
    color: #fff;
    transform: translateX(calc(-100% - 2.6vw));
    transition: transform 0.4s ease;
    width: 15%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: auto;
}

#guild-menu.visible { transform: translateX(0); }
#guild-menu.hidden {
    transform: translateX(calc(-100% - 2.6vw));
    pointer-events: none;
}

.guild-menu-btn {
    width: 100%;
    color: rgba(255, 220, 150, 0.9);
    font-size: 1.05vw;
    font-weight: 700;
    padding: 1.2vh 1vw;
    line-height: 1.3;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
    background-color: rgba(30, 20, 10, 0.7);
    border: 1px solid rgba(255, 200, 80, 0.15);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.15s ease, color 0.15s;
    font-family: 'MedievalSharp', cursive;
}

.guild-menu-btn:hover {
    background-color: rgba(60, 40, 15, 0.85);
    border-color: rgba(255, 200, 80, 0.35);
    transform: scale(1.03);
    color: #ffd700;
}

.guild-menu-btn.on {
    background-color: rgba(80, 50, 15, 0.9);
    border-color: rgba(255, 200, 80, 0.5);
    color: #ffd700;
}

/* Bottom Menu */
#bottom-menu {
    position: absolute;
    left: 2.6vw;
    bottom: 3.5vh;
    display: flex;
    flex-direction: row;
    gap: 16px;
    transition: opacity 0.4s ease;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
}

#bottom-menu.visible {
    opacity: 1;
    pointer-events: auto;
}

#btnHome {
    width: 3.2vw;
    height: 3.2vw;
    min-width: 36px;
    min-height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(30, 20, 10, 0.75);
    border: 1px solid rgba(255, 200, 80, 0.25);
    border-radius: 4px;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
}

#btnHome:hover {
    background: rgba(60, 40, 15, 0.85);
    border-color: rgba(255, 200, 80, 0.5);
    transform: scale(1.1);
}

#btnHome svg {
    width: 60%;
    height: 60%;
    fill: rgba(255, 200, 80, 0.8);
}

/* Info Overlay */
#info-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 102;
    background: rgba(10, 8, 4, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
}

#info-overlay.visible {
    opacity: 1;
    pointer-events: auto;
}

#info-overlay .info-card {
    max-width: 60%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 4vh 4vw;
    background: rgba(30, 20, 10, 0.95);
    border: 2px solid rgba(255, 200, 80, 0.4);
    border-radius: 8px;
    color: rgba(255, 220, 150, 0.9);
    font-family: 'MedievalSharp', cursive;
    text-align: center;
    box-shadow: 0 0 40px rgba(255, 170, 0, 0.15), inset 0 0 60px rgba(0,0,0,0.3);
}
#info-overlay .info-card::-webkit-scrollbar { width: 6px; }
#info-overlay .info-card::-webkit-scrollbar-track { background: rgba(30, 20, 10, 0.5); }
#info-overlay .info-card::-webkit-scrollbar-thumb { background: rgba(255, 200, 80, 0.3); border-radius: 3px; }

#info-overlay .info-card h2 {
    font-family: 'Cinzel', serif;
    color: #ffd700;
    font-size: 1.8vw;
    margin-bottom: 2vh;
    letter-spacing: 2px;
    line-height: 1.3;
}

#info-overlay .info-card p {
    font-size: 1.05vw;
    white-space: pre-line;
    text-align: left;
    line-height: 1.7;
    line-height: 1.8;
    opacity: 0.8;
}

#overlay-close-btn {
    position: absolute;
    top: 2.5vh;
    right: 2.5vw;
    z-index: 210;
    width: 3vw;
    height: 3vw;
    min-width: 36px;
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2vw;
    line-height: 1;
    color: rgba(255, 200, 80, 0.7);
    background: rgba(30, 20, 10, 0.7);
    border: 1px solid rgba(255, 200, 80, 0.2);
    border-radius: 50%;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, background 0.2s ease, color 0.2s ease;
    user-select: none;
}

#overlay-close-btn.visible {
    opacity: 1;
    pointer-events: auto;
}

#overlay-close-btn:hover {
    background: rgba(157, 2, 8, 0.7);
    color: #ffd700;
    border-color: rgba(255, 200, 80, 0.5);
}
    </style>
</head>
<body>
    <div id="aspect-ratio-container">
        <div id="kingdom-container"></div>

        <div id="info-overlay">
            <div class="info-card">
                <h2 id="info-title"></h2>
                <p id="info-text"></p>
            </div>
        </div>
        <div id="overlay-close-btn" aria-label="Close">&times;</div>

        <div id="audio-controls">
            <button id="btn-music" title="Toggle music">&#9835;</button>
            <button id="btn-sfx" title="Toggle sound effects">&#128264;</button>
        </div>

        <div id="realm-header">
            <span class="realm-icon">&#9876;</span>
            <span class="realm-title">Ansible Quest</span>
            <span class="realm-divider">|</span>
            <span class="realm-subtitle">Master Ansible Dev Tools — from Create to Test to Deploy</span>
        </div>

        <div id="mainContent">
            <div id="landingPage">

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
/* ═══════════════════════════════════════════════════════
   MEDIEVAL KINGDOM — Warcraft 2 style overhaul
   ═══════════════════════════════════════════════════════ */
var MedievalKingdom = (function () {
  var scene, camera, renderer, raycaster, mouse;
  var clock;
  var districts = {};
  var targetCamPos, targetCamLook, currentCamLook;
  var particles, stars;
  var traffic = [];
  var onDistrictClick = null;
  var onBannerClick = null;
  var selectedDistrict = null;
  var selectedGuild = null;
  var hoveredDistrict = null;
  var hoveredBanner = null;
  var animId = null;
  var container = null;
  var labelEls = {};
  var banners = {};
  var _animObjs = [];
  var _hoverCacheBuilt = false;
  var _catMeshes = [];
  var _bbMeshes = [];
  var _districtMeshes = [];
  var _campfirePeasants = [];

  var OVERVIEW = {
    pos: new THREE.Vector3(0, 55, 65),
    look: new THREE.Vector3(0, 0, -5),
  };

  var DISTRICT_CAMS = {
    village:  { pos: new THREE.Vector3(-22, 14, 32), look: new THREE.Vector3(-28, 0, -2) },
    township: { pos: new THREE.Vector3(5, 20, 35),   look: new THREE.Vector3(0, 0, -2) },
    fortress: { pos: new THREE.Vector3(32, 28, 38),  look: new THREE.Vector3(28, 0, -2) },
  };

  var GUILD_AREA_CAM = {
    pos: new THREE.Vector3(0, 18, 0),
    look: new THREE.Vector3(0, 6, -35),
  };

  var GUILD_CAMS = {
    warriors: { pos: new THREE.Vector3(-12, 10, -24), look: new THREE.Vector3(-12, 6, -35) },
    mages:    { pos: new THREE.Vector3(0, 10, -24),   look: new THREE.Vector3(0, 6, -35) },
    rangers:  { pos: new THREE.Vector3(12, 10, -24),  look: new THREE.Vector3(12, 6, -35) },
  };

  var orbit = {
    dragging: false, startX: 0, startY: 0,
    theta: 0, phi: 0.65, radius: 75,
    target: new THREE.Vector3(0, 0, -5),
    enabled: true, userControlling: false, returning: false,
    idleTimer: 0, IDLE_RESUME: 10,
    HOME_THETA: 0, HOME_PHI: 0.65, HOME_RADIUS: 75,
    MIN_PHI: 0.15, MAX_PHI: Math.PI / 2 - 0.05,
    MIN_RADIUS: 25, MAX_RADIUS: 130,
  };

  function orbitToPosition() {
    var sp = Math.sin(orbit.phi), cp = Math.cos(orbit.phi);
    return new THREE.Vector3(
      orbit.target.x + orbit.radius * sp * Math.sin(orbit.theta),
      orbit.target.y + orbit.radius * cp,
      orbit.target.z + orbit.radius * sp * Math.cos(orbit.theta)
    );
  }

  var _seed = 42;
  function rand() { _seed = (_seed * 16807) % 2147483647; return (_seed - 1) / 2147483646; }

  function init(el, clickCb, bbClickCb) {
    container = el;
    onDistrictClick = clickCb;
    onBannerClick = bbClickCb || null;

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x06101a);
    scene.fog = new THREE.FogExp2(0x06101a, 0.0022);

    camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 500);
    camera.position.copy(OVERVIEW.pos);
    camera.lookAt(OVERVIEW.look);

    targetCamPos = OVERVIEW.pos.clone();
    targetCamLook = OVERVIEW.look.clone();
    currentCamLook = OVERVIEW.look.clone();

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(container.clientWidth, container.clientHeight);
    if (renderer.toneMapping !== undefined) renderer.toneMapping = THREE.ACESFilmicToneMapping;
    if (renderer.toneMappingExposure !== undefined) renderer.toneMappingExposure = 1.6;
    container.appendChild(renderer.domElement);

    raycaster = new THREE.Raycaster();
    mouse = new THREE.Vector2(-999, -999);
    clock = new THREE.Clock();

    buildKingdom();
    addBanners();
    addLighting();
    addFireflies();
    addStars();
    addTrees();
    addMountains();
    addTraffic();
    createLabels();

    container.addEventListener("pointermove", onPointerMove);
    container.addEventListener("click", onClickHandler);
    container.addEventListener("pointerdown", onPointerDown);
    window.addEventListener("pointerup", onPointerUp);
    window.addEventListener("pointermove", onPointerMoveDrag);
    container.addEventListener("wheel", onWheel, { passive: false });
    window.addEventListener("resize", onResize);
    document.addEventListener("click", startBgMusic, { once: true });
    document.addEventListener("keydown", startBgMusic, { once: true });

    var dx = OVERVIEW.pos.x - orbit.target.x;
    var dy = OVERVIEW.pos.y - orbit.target.y;
    var dz = OVERVIEW.pos.z - orbit.target.z;
    orbit.radius = Math.sqrt(dx * dx + dy * dy + dz * dz);
    orbit.phi = Math.acos(dy / orbit.radius);
    orbit.theta = Math.atan2(dx, dz);

    animate();
  }

  // ─── Kingdom Construction ───

  function buildKingdom() {
    // Ground — rich Warcraft-green grass
    var gGeo = new THREE.PlaneGeometry(300, 200);
    var gMat = new THREE.MeshStandardMaterial({ color: 0x1a5a22, roughness: 0.85, metalness: 0.02 });
    var ground = new THREE.Mesh(gGeo, gMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.1;
    scene.add(ground);

    // Subtle grass texture grid
    var grid = new THREE.GridHelper(300, 60, 0x1e6a28, 0x185020);
    grid.position.y = 0.01;
    scene.add(grid);

    // Dirt roads — visible tan/brown
    var roadW = 3.5;
    var roadMat = new THREE.MeshStandardMaterial({ color: 0x8a6a3a, roughness: 0.9, emissive: new THREE.Color(0x3a2a10), emissiveIntensity: 0.15 });
    var hRoad = new THREE.Mesh(new THREE.PlaneGeometry(130, roadW), roadMat);
    hRoad.rotation.x = -Math.PI / 2;
    hRoad.position.set(0, 0.03, 14);
    scene.add(hRoad);

    [-28, 0, 28].forEach(function (x) {
      var vRoad = new THREE.Mesh(new THREE.PlaneGeometry(roadW, 40), roadMat);
      vRoad.rotation.x = -Math.PI / 2;
      vRoad.position.set(x, 0.03, -4);
      scene.add(vRoad);
    });

    // Road edges — pale stone borders
    var edgeMat = new THREE.MeshStandardMaterial({ color: 0x9a8a6a, roughness: 0.7, metalness: 0.15 });
    for (var ex = -60; ex <= 60; ex += 6) {
      var edge = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.4), edgeMat);
      edge.position.set(ex, 0.1, 14 + roadW / 2 + 0.25);
      scene.add(edge);
      var edge2 = edge.clone();
      edge2.position.z = 14 - roadW / 2 - 0.25;
      scene.add(edge2);
    }

    // Districts
    _seed = 42;
    makeDistrict("village",  -28, 0, 0x2d6a4f, 0x74c69d);
    makeDistrict("township",   0, 0, 0x7b2cbf, 0xc77dff);
    makeDistrict("fortress",  28, 0, 0x9d0208, 0xe5383b);

    // Village campfires
    addCampfires(-28, 0);
    // Fortress moat
    addMoat(28, 0);
  }

  function addCampfires(cx, cz) {
    // Place campfires safely outside the building grid (buildings span cx±10, cz±9)
    var spots = [[cx - 13, cz + 3], [cx + 13, cz - 3], [cx - 13, cz - 5], [cx + 13, cz + 6]];
    for (var i = 0; i < spots.length; i++) {
      var fx = spots[i][0], fz = spots[i][1];
      var fg = new THREE.Group();

      // Stone ring
      for (var si = 0; si < 6; si++) {
        var angle = (si / 6) * Math.PI * 2;
        var stone = new THREE.Mesh(
          new THREE.BoxGeometry(0.35, 0.2, 0.35),
          new THREE.MeshStandardMaterial({ color: 0x7a7a6a, roughness: 0.9 })
        );
        stone.position.set(Math.cos(angle) * 0.7, 0.1, Math.sin(angle) * 0.7);
        fg.add(stone);
      }

      // Log pile
      var logMat = new THREE.MeshStandardMaterial({ color: 0x5a3a1a, roughness: 0.85 });
      for (var li = 0; li < 3; li++) {
        var log = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.8, 5), logMat);
        log.rotation.z = Math.PI / 2;
        log.rotation.y = li * 1.0;
        log.position.set((li - 1) * 0.15, 0.22, (li - 1) * 0.1);
        fg.add(log);
      }

      // Flame — bright visible fire cones
      var flameMat = new THREE.MeshBasicMaterial({ color: 0xff6622, transparent: true, opacity: 0.9 });
      var flame1 = new THREE.Mesh(new THREE.ConeGeometry(0.25, 0.8, 6), flameMat);
      flame1.position.set(0, 0.7, 0);
      flame1.userData._isCampFlame = true;
      flame1.userData._flameIdx = i;
      _animObjs.push(flame1);
      fg.add(flame1);

      var innerFlame = new THREE.Mesh(
        new THREE.ConeGeometry(0.12, 0.5, 5),
        new THREE.MeshBasicMaterial({ color: 0xffcc33, transparent: true, opacity: 0.95 })
      );
      innerFlame.position.set(0, 0.55, 0);
      innerFlame.userData._isCampFlame = true;
      innerFlame.userData._flameIdx = i + 10;
      _animObjs.push(innerFlame);
      fg.add(innerFlame);

      // Strong warm campfire light
      var campLight = new THREE.PointLight(0xff8833, 4, 12, 1.5);
      campLight.position.set(0, 1.0, 0);
      fg.add(campLight);

      // Peasants gathered around the fire
      var pColors = [0x8a6a3a, 0x6a4a2a, 0x7a5a4a, 0x5a6a3a, 0x8a5a2a];
      var pSkins = [0xd4a574, 0xc49464, 0xb48454];
      var pCount = 2 + Math.floor(Math.random() * 3); // 2-4 peasants per fire
      for (var pi = 0; pi < pCount; pi++) {
        var pAngle = (pi / pCount) * Math.PI * 2 + i * 1.2;
        var pDist = 1.3 + Math.random() * 0.5;
        var px = Math.cos(pAngle) * pDist;
        var pz = Math.sin(pAngle) * pDist;
        var pg = new THREE.Group();
        pg.position.set(px, 0, pz);
        pg.lookAt(new THREE.Vector3(0, 0, 0));

        var pSkin = new THREE.MeshStandardMaterial({
          color: pSkins[pi % pSkins.length], roughness: 0.7,
          emissive: new THREE.Color(pSkins[pi % pSkins.length]).multiplyScalar(0.15), emissiveIntensity: 1,
        });
        var pTunic = new THREE.MeshStandardMaterial({
          color: pColors[pi % pColors.length], roughness: 0.8,
          emissive: new THREE.Color(pColors[pi % pColors.length]).multiplyScalar(0.2), emissiveIntensity: 1,
        });

        var cfEyeMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
        var sitting = Math.random() > 0.4;
        if (sitting) {
          var sTorso = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.3, 0.16), pTunic);
          sTorso.position.y = 0.32;
          pg.add(sTorso);
          var sHead = new THREE.Mesh(new THREE.SphereGeometry(0.12, 5, 5), pSkin);
          sHead.position.y = 0.56;
          pg.add(sHead);
          var sEyeL = new THREE.Mesh(new THREE.SphereGeometry(0.018, 4, 4), cfEyeMat);
          sEyeL.position.set(0.045, 0.58, 0.1);
          pg.add(sEyeL);
          var sEyeR = new THREE.Mesh(new THREE.SphereGeometry(0.018, 4, 4), cfEyeMat);
          sEyeR.position.set(-0.045, 0.58, 0.1);
          pg.add(sEyeR);
          var sLeg = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.07, 0.25), new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.9 }));
          sLeg.position.set(0, 0.12, 0.16);
          pg.add(sLeg);
          var seat = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.17, 0.22, 5), new THREE.MeshStandardMaterial({ color: 0x5a3a1a, roughness: 0.9 }));
          seat.position.y = 0.1;
          pg.add(seat);
        } else {
          var stBody = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.35, 0.16), pTunic);
          stBody.position.y = 0.45;
          pg.add(stBody);
          var stHead = new THREE.Mesh(new THREE.SphereGeometry(0.12, 5, 5), pSkin);
          stHead.position.y = 0.72;
          pg.add(stHead);
          var stEyeL = new THREE.Mesh(new THREE.SphereGeometry(0.018, 4, 4), cfEyeMat);
          stEyeL.position.set(0.045, 0.74, 0.1);
          pg.add(stEyeL);
          var stEyeR = new THREE.Mesh(new THREE.SphereGeometry(0.018, 4, 4), cfEyeMat);
          stEyeR.position.set(-0.045, 0.74, 0.1);
          pg.add(stEyeR);
          var stLegL = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.25, 0.07), new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.9 }));
          stLegL.position.set(0.06, 0.15, 0);
          pg.add(stLegL);
          var stLegR = stLegL.clone();
          stLegR.position.x = -0.06;
          pg.add(stLegR);
        }
        fg.add(pg);
        _campfirePeasants.push({ group: pg, parent: fg, wx: fx + px, wz: fz + pz });
      }

      fg.position.set(fx, 0, fz);
      scene.add(fg);
    }
  }

  function addMoat(cx, cz) {
    var waterMat = new THREE.MeshStandardMaterial({
      color: 0x2288bb, roughness: 0.25, metalness: 0.4,
      emissive: new THREE.Color(0x104060), emissiveIntensity: 0.5,
      transparent: true, opacity: 0.8,
    });
    var wallMat = new THREE.MeshStandardMaterial({
      color: 0x7a7060, roughness: 0.75, metalness: 0.15,
      emissive: new THREE.Color(0x2a2520), emissiveIntensity: 0.2,
    });

    var half = 12;
    var mw = 1.8;
    var wallH = 0.6;
    var gateGap = 3;

    // 4 water channels (N, S, E, W) with gap on south side for drawbridge
    // North side
    var nWater = new THREE.Mesh(new THREE.PlaneGeometry(half * 2, mw), waterMat);
    nWater.rotation.x = -Math.PI / 2;
    nWater.position.set(cx, 0.06, cz - half);
    scene.add(nWater);
    // South side — two segments with drawbridge gap in center
    var sSegLen = (half * 2 - gateGap) / 2;
    var sL = new THREE.Mesh(new THREE.PlaneGeometry(sSegLen, mw), waterMat);
    sL.rotation.x = -Math.PI / 2;
    sL.position.set(cx - sSegLen / 2 - gateGap / 2, 0.06, cz + half);
    scene.add(sL);
    var sR = new THREE.Mesh(new THREE.PlaneGeometry(sSegLen, mw), waterMat);
    sR.rotation.x = -Math.PI / 2;
    sR.position.set(cx + sSegLen / 2 + gateGap / 2, 0.06, cz + half);
    scene.add(sR);
    // East side
    var eWater = new THREE.Mesh(new THREE.PlaneGeometry(mw, half * 2), waterMat);
    eWater.rotation.x = -Math.PI / 2;
    eWater.position.set(cx + half, 0.06, cz);
    scene.add(eWater);
    // West side
    var wWater = new THREE.Mesh(new THREE.PlaneGeometry(mw, half * 2), waterMat);
    wWater.rotation.x = -Math.PI / 2;
    wWater.position.set(cx - half, 0.06, cz);
    scene.add(wWater);

    // Stone walls along moat edges (inner + outer)
    var segs = [
      // North outer/inner
      [cx, cz - half - mw / 2, half * 2 + mw * 2, true],
      [cx, cz - half + mw / 2, half * 2 - mw * 2, true],
      // South outer (two pieces with gate gap)
      [cx - sSegLen / 2 - gateGap / 2, cz + half + mw / 2, sSegLen, true],
      [cx + sSegLen / 2 + gateGap / 2, cz + half + mw / 2, sSegLen, true],
      // South inner
      [cx - sSegLen / 2 - gateGap / 2, cz + half - mw / 2, sSegLen, true],
      [cx + sSegLen / 2 + gateGap / 2, cz + half - mw / 2, sSegLen, true],
      // East outer/inner
      [cx + half + mw / 2, cz, half * 2 + mw * 2, false],
      [cx + half - mw / 2, cz, half * 2 - mw * 2, false],
      // West outer/inner
      [cx - half - mw / 2, cz, half * 2 + mw * 2, false],
      [cx - half + mw / 2, cz, half * 2 - mw * 2, false],
    ];
    for (var si = 0; si < segs.length; si++) {
      var s = segs[si];
      var wLen = s[2];
      var geo = s[3] ? new THREE.BoxGeometry(wLen, wallH, 0.25) : new THREE.BoxGeometry(0.25, wallH, wLen);
      var wall = new THREE.Mesh(geo, wallMat);
      wall.position.set(s[0], wallH / 2, s[1]);
      scene.add(wall);
    }

    // Drawbridge — wooden plank over the south gap
    var bridgeMat = new THREE.MeshStandardMaterial({ color: 0x7a5a2a, roughness: 0.8, emissive: new THREE.Color(0x3a2a10), emissiveIntensity: 0.2 });
    var bridge = new THREE.Mesh(new THREE.BoxGeometry(gateGap + 0.5, 0.15, mw + 0.6), bridgeMat);
    bridge.position.set(cx, 0.12, cz + half);
    scene.add(bridge);

    // Gate towers flanking drawbridge
    var towerMat = new THREE.MeshStandardMaterial({ color: 0x8a7a60, roughness: 0.7, metalness: 0.2, emissive: new THREE.Color(0x2a2520), emissiveIntensity: 0.15 });
    for (var gi = -1; gi <= 1; gi += 2) {
      var tower = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.7, 4, 6), towerMat);
      tower.position.set(cx + gi * (gateGap / 2 + 0.5), 2, cz + half);
      scene.add(tower);
      var tRoof = new THREE.Mesh(new THREE.ConeGeometry(0.8, 1.5, 6), new THREE.MeshStandardMaterial({ color: 0x8a2020, roughness: 0.7 }));
      tRoof.position.set(cx + gi * (gateGap / 2 + 0.5), 4.5, cz + half);
      scene.add(tRoof);
    }

    // Subtle water glow
    var waterGlow = new THREE.PointLight(0x2288cc, 1.0, 25, 2);
    waterGlow.position.set(cx, 1.5, cz);
    scene.add(waterGlow);
  }

  var _treeIMs = {};
  function addTrees() {
    var positions = [];
    for (var i = 0; i < 120; i++) {
      var tx = (Math.random() - 0.5) * 200;
      var tz = (Math.random() - 0.5) * 120;
      var tooClose = false;
      var dists = [[-28, 0], [0, 0], [28, 0]];
      for (var di = 0; di < dists.length; di++) {
        if (Math.sqrt(Math.pow(tx - dists[di][0], 2) + Math.pow(tz - dists[di][1], 2)) < 16) tooClose = true;
      }
      if (Math.abs(tz - 14) < 3) tooClose = true;
      if (Math.abs(Math.abs(tx) - 28) < 3 || Math.abs(tx) < 3) tooClose = true;
      if (tooClose) continue;
      positions.push([tx, tz, 2 + Math.random() * 4, 0.8 + Math.random() * 1.2]);
    }

    _treePositions = positions.map(function (p) { return { x: p[0], z: p[1], h: p[2], r: p[3], alive: true }; });

    var n = positions.length;
    var trunkGeo = new THREE.CylinderGeometry(0.12, 0.18, 1, 4);
    var trunkMat = new THREE.MeshStandardMaterial({ color: 0x6a4a2a, roughness: 0.85, emissive: new THREE.Color(0x2a1a08), emissiveIntensity: 0.3 });
    var trunkIM = new THREE.InstancedMesh(trunkGeo, trunkMat, n);

    var foliageGeo = new THREE.ConeGeometry(1, 1, 5);
    var foliageMat = new THREE.MeshStandardMaterial({ color: 0x2a8a2a, roughness: 0.75, emissive: new THREE.Color(0x0a3a0a), emissiveIntensity: 0.5 });
    var foliageIM1 = new THREE.InstancedMesh(foliageGeo, foliageMat, n);
    var foliageMat2 = new THREE.MeshStandardMaterial({ color: 0x1e7a20, roughness: 0.8, emissive: new THREE.Color(0x083008), emissiveIntensity: 0.45 });
    var foliageIM2 = new THREE.InstancedMesh(foliageGeo, foliageMat2, n);
    var foliageIM3 = new THREE.InstancedMesh(foliageGeo, foliageMat2, n);

    var m = new THREE.Matrix4();
    for (var i = 0; i < n; i++) {
      var p = positions[i];
      var h = p[2], r = p[3];

      m.makeScale(1, h * 0.4, 1);
      m.setPosition(p[0], h * 0.2, p[1]);
      trunkIM.setMatrixAt(i, m);

      for (var li = 0; li < 3; li++) {
        var lr = r * (1 - li * 0.25);
        var lh = h * 0.35;
        m.makeScale(lr, lh, lr);
        m.setPosition(p[0], h * 0.35 + li * lh * 0.6, p[1]);
        [foliageIM1, foliageIM2, foliageIM3][li].setMatrixAt(i, m);
      }
    }

    _treeIMs = { trunk: trunkIM, f1: foliageIM1, f2: foliageIM2, f3: foliageIM3 };
    scene.add(trunkIM);
    scene.add(foliageIM1);
    scene.add(foliageIM2);
    scene.add(foliageIM3);
  }

      { x: -110, z: 10,  h: 6, r: 18 },

  // ─── District Styles ───

  var DISTRICT_STYLES = {
    village: {
      density: 0.75, heightMult: 0.12, baseHeight: 0.8,
      minW: 1.4, maxW: 2.6, roofStyle: "peaked", towerType: "watchtower",
    },
    township: {
      density: 0.72, heightMult: 0.4, baseHeight: 1.5,
      minW: 1.2, maxW: 2.2, roofStyle: "turret", towerType: "clocktower",
    },
    fortress: {
      density: 0.7, heightMult: 0.9, baseHeight: 2.0,
      minW: 1.4, maxW: 2.8, roofStyle: "battlement", towerType: "wizardtower",
    },
  };

  function makeDistrict(id, cx, cz, colorHex, accentHex) {
    var group = new THREE.Group();
    group.position.set(cx, 0, cz);
    var color = new THREE.Color(colorHex);
    var accent = new THREE.Color(accentHex);
    var bList = [];
    var style = DISTRICT_STYLES[id];

    var vRoadHalf = 3.8;
    var hRoadWorldZ = 14;
    var hRoadHalf = 3.8;

    for (var x = -10; x <= 10; x += 3.2) {
      for (var z = -9; z <= 9; z += 3.2) {
        if (rand() > style.density) continue;
        var ox = (rand() - 0.5) * 0.6;
        var oz = (rand() - 0.5) * 0.6;
        var bx = x + ox;
        var bz = z + oz;
        if (Math.abs(bx) < vRoadHalf) continue;
        if (Math.abs((cz + bz) - hRoadWorldZ) < hRoadHalf) continue;

        var dist = Math.sqrt(x * x + z * z);
        var maxH = (dist < 4 ? 18 : dist < 7 ? 12 : 7) * style.heightMult;
        var h = style.baseHeight + rand() * maxH;
        var w = style.minW + rand() * (style.maxW - style.minW);
        var d = style.minW + rand() * (style.maxW - style.minW);

        var b = makeBuilding(bx, bz, w, h, d, color, accent, style);
        b.userData.districtId = id;
        group.add(b);
        bList.push(b);
        _buildingBoxes.push({ x: cx + bx, z: cz + bz, hw: w * 0.55, hd: d * 0.55 });
      }
    }

    // Signature structures
    var sigTower = makeSignatureTower(id, -5, -2, color, accent);
    sigTower.userData.districtId = id;
    group.add(sigTower);
    bList.push(sigTower);

    var wizTower = makeWizardTower(6, -6, color, accent, id === "fortress" ? 1.0 : id === "township" ? 0.7 : 0.4);
    wizTower.userData.districtId = id;
    group.add(wizTower);
    bList.push(wizTower);

    districts[id] = { group: group, buildings: bList, color: color, accent: accent };
    scene.add(group);
  }

  function makeBuilding(x, z, w, h, d, color, accent, style) {
    var g = new THREE.Group();
    g.position.set(x, 0, z);

    // Stone/wood shade — bright enough to pop against green grass
    var stoneShade = new THREE.Color(0x9a8a6a).lerp(color.clone(), 0.1 + rand() * 0.12);
    var wallMat = new THREE.MeshStandardMaterial({
      color: stoneShade, roughness: 0.7, metalness: 0.12,
      emissive: color.clone().multiplyScalar(0.08), emissiveIntensity: 1,
    });

    // Main structure
    var geo = new THREE.BoxGeometry(w, h, d);
    var mesh = new THREE.Mesh(geo, wallMat);
    mesh.position.y = h / 2;
    g.add(mesh);

    // Roof based on district style
    if (style.roofStyle === "peaked") {
      var roofH = w * 0.5 + rand() * 0.4;
      var roofGeo = new THREE.ConeGeometry(Math.max(w, d) * 0.72, roofH, 4);
      var roofMat = new THREE.MeshStandardMaterial({
        color: 0x8a6a30, roughness: 0.75, metalness: 0.05,
        emissive: new THREE.Color(0x4a3a15), emissiveIntensity: 0.3,
      });
      var roof = new THREE.Mesh(roofGeo, roofMat);
      roof.position.y = h + roofH / 2;
      roof.rotation.y = Math.PI / 4;
      g.add(roof);
    } else if (style.roofStyle === "turret") {
      var turretH = w * 0.6 + rand() * 0.5;
      var turretGeo = new THREE.ConeGeometry(Math.max(w, d) * 0.55, turretH, 6);
      var turretMat = new THREE.MeshStandardMaterial({
        color: 0x4a3a60, roughness: 0.6, metalness: 0.2,
        emissive: accent.clone().multiplyScalar(0.08), emissiveIntensity: 1,
      });
      var turret = new THREE.Mesh(turretGeo, turretMat);
      turret.position.y = h + turretH / 2;
      g.add(turret);
    } else if (style.roofStyle === "battlement") {
      // Crenellations
      var crenW = 0.3;
      var crenH = 0.5;
      var crenMat = new THREE.MeshStandardMaterial({
        color: stoneShade.clone().multiplyScalar(1.1), roughness: 0.7, metalness: 0.2,
      });
      var numCren = Math.max(2, Math.floor(w / 0.6));
      for (var ci = 0; ci < numCren; ci++) {
        if (ci % 2 === 0) {
          var cren = new THREE.Mesh(new THREE.BoxGeometry(crenW, crenH, d * 0.15), crenMat);
          cren.position.set(-w / 2 + crenW / 2 + ci * (w / numCren), h + crenH / 2, d / 2 - 0.1);
          g.add(cren);
          var cren2 = cren.clone();
          cren2.position.z = -d / 2 + 0.1;
          g.add(cren2);
        }
      }
    }

    // Windows — warm candlelight
    var rows = Math.floor(h / 1.8);
    addMedievalWindows(g, w, d, h, rows, accent);

    // Occasional torch on wall
    if (h > 3 && rand() > 0.6) {
      addWallTorch(g, w, d, h);
    }

    return g;
  }

  function addMedievalWindows(parent, w, d, h, rows, accent) {
    var warmColor = new THREE.Color(0xffcc66);
    for (var r = 0; r < rows; r++) {
      var y = 1.0 + r * 1.8;
      if (y > h - 0.8) break;
      if (rand() > 0.85) continue;

      var op = 0.3 + rand() * 0.5;
      var lit = rand() > 0.3;
      var wColor = lit ? warmColor.clone().lerp(accent, 0.15) : new THREE.Color(0x1a1510);
      var wMat = new THREE.MeshBasicMaterial({
        color: wColor, transparent: true, opacity: op,
        depthWrite: false, polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1,
      });

      var winW = 0.25 + rand() * 0.25;
      var winH = 0.35 + rand() * 0.2;

      // Front & back
      var cols = Math.max(1, Math.floor(w / 1.2));
      for (var c = 0; c < cols; c++) {
        if (rand() > 0.8) continue;
        var xOff = -w * 0.3 + c * (w * 0.6 / Math.max(1, cols - 1));
        if (cols === 1) xOff = 0;
        var wf = new THREE.Mesh(new THREE.PlaneGeometry(winW, winH), wMat);
        wf.position.set(xOff, y, d / 2 + 0.07);
        parent.add(wf);
        var wb = wf.clone();
        wb.position.z = -(d / 2 + 0.07);
        wb.rotation.y = Math.PI;
        parent.add(wb);
      }

      // Sides
      if (rand() > 0.5) {
        var ws = new THREE.Mesh(new THREE.PlaneGeometry(winW, winH), wMat);
        ws.position.set(w / 2 + 0.07, y, 0);
        ws.rotation.y = Math.PI / 2;
        parent.add(ws);
        var ws2 = ws.clone();
        ws2.position.x = -(w / 2 + 0.07);
        ws2.rotation.y = -Math.PI / 2;
        parent.add(ws2);
      }
    }
  }

  function addWallTorch(parent, w, d, h) {
    var torchY = Math.min(h * 0.6, 3);
    var side = rand() > 0.5 ? 1 : -1;
    var torchMat = new THREE.MeshStandardMaterial({ color: 0x4a3a20, roughness: 0.6, metalness: 0.3 });
    var handle = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.6, 4), torchMat);
    handle.position.set(side * (w / 2 + 0.2), torchY, d / 2 + 0.1);
    handle.rotation.z = side * 0.3;
    parent.add(handle);

    var flameMat = new THREE.MeshBasicMaterial({ color: 0xff8822, transparent: true, opacity: 0.8 });
    var flame = new THREE.Mesh(new THREE.SphereGeometry(0.12, 4, 4), flameMat);
    flame.position.set(side * (w / 2 + 0.3), torchY + 0.35, d / 2 + 0.1);
    flame.userData._isTorchFlame = true;
    _animObjs.push(flame);
    parent.add(flame);
  }

  // ─── Signature Tower ───

  function makeSignatureTower(districtId, x, z, color, accent) {
    var g = new THREE.Group();
    var h, r1, r2;
    if (districtId === "fortress") {
      h = 22; r1 = 1.2; r2 = 1.8;
    } else if (districtId === "township") {
      h = 14; r1 = 0.8; r2 = 1.2;
    } else {
      h = 8; r1 = 0.6; r2 = 0.8;
    }

    // Round tower body
    var bodyGeo = new THREE.CylinderGeometry(r1, r2, h, 8);
    var bodyMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(0x8a7a60).lerp(color.clone(), 0.2),
      roughness: 0.65, metalness: 0.2,
      emissive: color.clone().multiplyScalar(0.1),
    });
    var body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.set(x, h / 2, z);
    g.add(body);

    // Conical roof
    var roofH = h * 0.25;
    var roofGeo = new THREE.ConeGeometry(r1 * 1.3, roofH, 8);
    var roofMat = new THREE.MeshStandardMaterial({
      color: districtId === "village" ? 0x5a4a2a : districtId === "township" ? 0x4a3a60 : 0x6a1a1a,
      roughness: 0.6, metalness: 0.1,
    });
    var roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.set(x, h + roofH / 2, z);
    g.add(roof);

    // Flag on top
    var flagPole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.03, 0.03, 3, 4),
      new THREE.MeshStandardMaterial({ color: 0x666666 })
    );
    flagPole.position.set(x, h + roofH + 1.5, z);
    g.add(flagPole);

    var flagGeo = new THREE.PlaneGeometry(1.2, 0.7);
    var flagMat = new THREE.MeshBasicMaterial({
      color: accent, transparent: true, opacity: 0.85, side: THREE.DoubleSide,
    });
    var flag = new THREE.Mesh(flagGeo, flagMat);
    flag.position.set(x + 0.6, h + roofH + 2.5, z);
    flag.userData._isFlag = true;
    _animObjs.push(flag);
    g.add(flag);

    // Beacon light at top
    var beacon = new THREE.Mesh(
      new THREE.SphereGeometry(0.2, 8, 8),
      new THREE.MeshBasicMaterial({ color: accent, transparent: true, opacity: 0.9 })
    );
    beacon.position.set(x, h + roofH + 0.1, z);
    beacon.userData._isBeacon = true;
    _animObjs.push(beacon);
    g.add(beacon);

    return g;
  }

  // ─── Wizard Tower ───

  function makeWizardTower(x, z, color, accent, scale) {
    scale = scale || 1.0;
    var g = new THREE.Group();
    var h = 14 * scale;

    // Tower body
    var pGeo = new THREE.CylinderGeometry(0.4 * scale, 0.6 * scale, h, 8);
    var pMat = new THREE.MeshStandardMaterial({
      color: 0x3a3a4a, roughness: 0.6, metalness: 0.3,
      emissive: accent.clone().multiplyScalar(0.05),
    });
    var pole = new THREE.Mesh(pGeo, pMat);
    pole.position.set(x, h / 2, z);
    g.add(pole);

    // Glowing crystal on top
    var crystalGeo = new THREE.OctahedronGeometry(0.5 * scale, 0);
    var crystalMat = new THREE.MeshStandardMaterial({
      color: accent, emissive: accent, emissiveIntensity: 0.8,
      transparent: true, opacity: 0.7, roughness: 0.1, metalness: 0.9,
    });
    var crystal = new THREE.Mesh(crystalGeo, crystalMat);
    crystal.position.set(x, h + 0.5 * scale, z);
    crystal.userData._isCrystal = true;
    _animObjs.push(crystal);
    g.add(crystal);

    // Magical rings
    for (var ri = 0; ri < 2; ri++) {
      var rGeo = new THREE.TorusGeometry((1.0 + ri * 0.8) * scale, 0.04, 8, 24);
      var rMat = new THREE.MeshBasicMaterial({
        color: accent, transparent: true, opacity: 0.2 - ri * 0.05,
      });
      var ring = new THREE.Mesh(rGeo, rMat);
      ring.position.set(x, h + 0.5 * scale, z);
      ring.rotation.x = Math.PI / 2;
      ring.userData._isRing = true;
      ring.userData._ringIdx = ri;
      _animObjs.push(ring);
      g.add(ring);
    }

    // Crystal glow light
    var glow = new THREE.PointLight(accent.getHex(), 2, 12, 2);
    glow.position.set(x, h + 0.5 * scale, z);
    g.add(glow);

    return g;
  }

  // ─── Heraldic Banners (replacing billboards) ───

  var bannerFade = { target: 0, current: 0 };

  function addBanners() {
    var guildDefs = [
      { id: "warriors", x: -12, z: -35, accent: 0xcc3333, symbol: "sword" },
      { id: "mages",    x:   0, z: -35, accent: 0x3366cc, symbol: "staff" },

        crossbar.rotation.z = Math.PI / 2;

        group.add(crossbar);

        // Banner fabric
        var bannerW = 5.5, bannerH = 6;
        var bannerGeo = new THREE.PlaneGeometry(bannerW, bannerH);
        var bannerMat = new THREE.MeshStandardMaterial({
          color: def.accent, roughness: 0.8, metalness: 0.0,
          emissive: new THREE.Color(def.accent).multiplyScalar(0.15),
          side: THREE.DoubleSide,
        });
        var banner = new THREE.Mesh(bannerGeo, bannerMat);
        banner.position.set(0, poleH - 0.5 - bannerH / 2, 0.1);
        group.add(banner);

        // Guild symbol (simple geometric)
        var symbolMat = new THREE.MeshBasicMaterial({ color: 0xffd700, side: THREE.DoubleSide });
        if (def.symbol === "sword") {
          var blade = new THREE.Mesh(new THREE.BoxGeometry(0.15, 2.5, 0.05), symbolMat);
          blade.position.set(0, poleH - 3.5, 0.15);
          group.add(blade);
          var hilt = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.15, 0.05), symbolMat);
          hilt.position.set(0, poleH - 4.5, 0.15);
          group.add(hilt);
        } else if (def.symbol === "staff") {
          var staff = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 2.8, 6), symbolMat);
          staff.position.set(0, poleH - 3.5, 0.15);
          group.add(staff);
          var orb = new THREE.Mesh(new THREE.SphereGeometry(0.35, 8, 8), symbolMat);
          orb.position.set(0, poleH - 2.2, 0.15);
          group.add(orb);
        } else {
          // Bow shape — simple arc
          var bowGeo = new THREE.TorusGeometry(1.0, 0.06, 8, 16, Math.PI);
          var bow = new THREE.Mesh(bowGeo, symbolMat);
          bow.position.set(0, poleH - 3.5, 0.15);
          bow.rotation.z = -Math.PI / 2;
          group.add(bow);
          var string = new THREE.Mesh(new THREE.BoxGeometry(0.03, 2.0, 0.02), symbolMat);
          string.position.set(-0.02, poleH - 3.5, 0.15);

        var tMat = new THREE.MeshBasicMaterial({ color: 0xff8822 });

        group.add(torch1);
        var torch2 = torch1.clone();
        torch2.userData._isTorchFlame = true;
        torch2.position.x = 3;
        _animObjs.push(torch2);
        group.add(torch2);

        var tl1 = new THREE.PointLight(0xff8833, 2, 8, 2);
        tl1.position.set(0, 6, 0);
        group.add(tl1);

        group.traverse(function (child) {
          if (child.isMesh) child.userData._bannerGuild = def.id;
        });

        banners[def.id] = group;
        scene.add(group);
      })(guildDefs[i]);
    }
  }

  function showBanners() {
    bannerFade.target = 1;
    Object.keys(banners).forEach(function (k) { banners[k].visible = true; });
  }

  function hideBanners() { bannerFade.target = 0; }

  function updateBannerFade(dt) {
    if (bannerFade.current === bannerFade.target) return;
    var speed = 2.5;
    bannerFade.current = bannerFade.target > bannerFade.current
      ? Math.min(1, bannerFade.current + dt * speed)
      : Math.max(0, bannerFade.current - dt * speed);
    var opacity = bannerFade.current;
    Object.keys(banners).forEach(function (k) {
      banners[k].traverse(function (child) {
        if (child.isMesh && child.material) {
          if (child.material._origOpacity === undefined) child.material._origOpacity = child.material.opacity || 1;
          child.material.transparent = true;
          child.material.opacity = child.material._origOpacity * opacity;
        }
      });
      if (opacity <= 0) banners[k].visible = false;
    });
  }

  // ─── Fireflies ───

  function addFireflies() {
    var n = 200;
    var pos = new Float32Array(n * 3);
    var col = new Float32Array(n * 3);
    var accents = [districts.village.accent, districts.township.accent, districts.fortress.accent];
    var warmGold = new THREE.Color(0xffcc44);

    for (var i = 0; i < n; i++) {
      pos[i * 3] = (Math.random() - 0.5) * 130;
      pos[i * 3 + 1] = 0.3 + Math.random() * 25;
      pos[i * 3 + 2] = (Math.random() - 0.5) * 80;
      var c = Math.random() > 0.6 ? warmGold : accents[Math.floor(Math.random() * 3)];
      col[i * 3] = c.r;
      col[i * 3 + 1] = c.g;
      col[i * 3 + 2] = c.b;
    }
    var geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
    geo.setAttribute("color", new THREE.BufferAttribute(col, 3));
    var mat = new THREE.PointsMaterial({
      size: 0.15, vertexColors: true, transparent: true, opacity: 0.5,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    particles = new THREE.Points(geo, mat);
    scene.add(particles);
  }

  // ─── Stars ───

  function addStars() {
    var n = 800;
    var pos = new Float32Array(n * 3);
    var sizes = new Float32Array(n);
    var phases = new Float32Array(n);
    for (var i = 0; i < n; i++) {
      var theta = Math.random() * Math.PI * 2;
      var phi = Math.random() * Math.PI * 0.45;
      var r = 120 + Math.random() * 40;
      pos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      pos[i * 3 + 1] = r * Math.cos(phi);
      pos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
      sizes[i] = 0.5 + Math.random() * 1.2;
      phases[i] = Math.random() * Math.PI * 2;
    }
    var geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
    geo.setAttribute("aSize", new THREE.BufferAttribute(sizes, 1));

    starPhases = phases;
    starBaseSizes = sizes.slice();

    var mat = new THREE.PointsMaterial({
      color: 0xeeeeff, size: 1.0, transparent: true, opacity: 0.85,
      blending: THREE.AdditiveBlending, depthWrite: false,
      sizeAttenuation: true, fog: false,
    });
    stars = new THREE.Points(geo, mat);
    scene.add(stars);
  }
  var starPhases, starBaseSizes;

  // ─── Stone Bridge ───

  function addStoneBridge(z) {
    var trackLen = 140;
    var pillarSpacing = 16;

    var bridgeMat = new THREE.MeshStandardMaterial({
      color: 0x8a8070, roughness: 0.8, metalness: 0.1,
      emissive: new THREE.Color(0x3a3530), emissiveIntensity: 0.25,
    });

    // Main bridge deck
    var deck = new THREE.Mesh(new THREE.BoxGeometry(trackLen, 0.3, 2.5), bridgeMat);
    deck.position.set(0, 0.15, z);
    scene.add(deck);

    // Stone walls on sides
    var wallGeo = new THREE.BoxGeometry(trackLen, 0.4, 0.2);
    var wall1 = new THREE.Mesh(wallGeo, bridgeMat);
    wall1.position.set(0, 0.5, z + 1.15);
    scene.add(wall1);
    var wall2 = wall1.clone();
    wall2.position.z = z - 1.15;
    scene.add(wall2);

    // Wall-mounted posts with torches (on the outside of walls, not blocking the road)
    for (var px = -trackLen / 2 + 8; px <= trackLen / 2 - 8; px += pillarSpacing) {
      // Small posts on top of each wall
      var post1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.6, 0.3), bridgeMat);
      post1.position.set(px, 0.9, z + 1.15);
      scene.add(post1);
      var post2 = post1.clone();
      post2.position.z = z - 1.15;
      scene.add(post2);

      // Torch on alternating posts
      if (Math.abs(px) % 20 < 11) {
        var tFlame = new THREE.Mesh(
          new THREE.SphereGeometry(0.1, 4, 4),
          new THREE.MeshBasicMaterial({ color: 0xff8822, transparent: true, opacity: 0.8 })
        );
        tFlame.position.set(px, 1.5, z + 1.3);
        tFlame.userData._isTorchFlame = true;
        _animObjs.push(tFlame);
        scene.add(tFlame);
      }
    }
  }

  // ─── Wagon Train — medieval supply caravan ───

  function addWagonTrain(cfg) {
    var g = new THREE.Group();

    // === LEAD HORSES — side by side ===
    var horseColors = [0x7a5530, 0x5a3a20];
    var horseLegRefs = [];
    for (var hi = 0; hi < 2; hi++) {
      var horseData = makeHorse(horseColors[hi]);
      horseData.group.position.set(5.0, 0, (hi - 0.5) * 1.4);
      g.add(horseData.group);
      horseLegRefs.push(horseData.legs);
    }

    // Yoke bar between horses + traces to wagon
    var ropeMat = new THREE.MeshStandardMaterial({ color: 0x5a4a30, roughness: 0.9 });
    var yoke = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.06, 1.8), ropeMat);
    yoke.position.set(4.2, 0.7, 0);
    g.add(yoke);
    for (var ri = -1; ri <= 1; ri += 2) {
      var trace = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.04, 0.04), ropeMat);
      trace.position.set(3.0, 0.65, ri * 0.7);
      g.add(trace);
    }

    // === MAIN WAGON — bright, visible ===
    var darkWood = new THREE.MeshStandardMaterial({
      color: 0x8a6a35, roughness: 0.7, metalness: 0.05,
      emissive: new THREE.Color(0x4a3a18), emissiveIntensity: 0.35,
    });
    var lightWood = new THREE.MeshStandardMaterial({
      color: 0xaa8a50, roughness: 0.75, metalness: 0.05,
      emissive: new THREE.Color(0x5a4a25), emissiveIntensity: 0.3,
    });
    var metalMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.5, roughness: 0.4 });

    // Wagon bed / floor
    var bed = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.2, 1.6), darkWood);
    bed.position.set(0, 0.55, 0);
    g.add(bed);

    // Side walls
    var sideGeo = new THREE.BoxGeometry(3.5, 0.6, 0.1);
    var sideL = new THREE.Mesh(sideGeo, lightWood);
    sideL.position.set(0, 0.95, 0.8);
    g.add(sideL);
    var sideR = sideL.clone();
    sideR.position.z = -0.8;
    g.add(sideR);
    // Front/back walls
    var endGeo = new THREE.BoxGeometry(0.1, 0.6, 1.6);
    var front = new THREE.Mesh(endGeo, lightWood);
    front.position.set(1.75, 0.95, 0);
    g.add(front);
    var back = front.clone();
    back.position.x = -1.75;
    g.add(back);

    // Canvas canopy — bright cream/off-white, arched
    var canvasMat = new THREE.MeshStandardMaterial({
      color: 0xddccaa, roughness: 0.85, metalness: 0.0, side: THREE.DoubleSide,
      emissive: new THREE.Color(0x6a5a40), emissiveIntensity: 0.3,
    });
    // Canopy ribs (wooden arches)
    for (var ci = -1; ci <= 1; ci++) {
      var rib = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.04, 4, 8, Math.PI), darkWood);
      rib.position.set(ci * 1.2, 1.25, 0);
      rib.rotation.y = Math.PI / 2;
      g.add(rib);
    }
    // Canvas cover — cylinder half
    var canopyGeo = new THREE.CylinderGeometry(0.7, 0.7, 3.2, 8, 1, false, 0, Math.PI);
    var canopy = new THREE.Mesh(canopyGeo, canvasMat);
    canopy.rotation.z = Math.PI / 2;
    canopy.position.set(0, 1.25, 0);
    g.add(canopy);

    // Cargo peeking out the back — crates and barrels
    var crateMat = new THREE.MeshStandardMaterial({ color: 0x9a7a45, roughness: 0.8, emissive: new THREE.Color(0x4a3a20), emissiveIntensity: 0.25 });
    var crate = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), crateMat);
    crate.position.set(-1.4, 0.9, 0.3);
    crate.rotation.y = 0.3;
    g.add(crate);
    var barrelMat = new THREE.MeshStandardMaterial({ color: 0x7a5a2a, roughness: 0.75, emissive: new THREE.Color(0x3a2a10), emissiveIntensity: 0.2 });
    var barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.5, 6), barrelMat);
    barrel.position.set(-1.3, 0.9, -0.3);
    g.add(barrel);

    // Wheels — solid wooden discs with metal rim and hub
    var wheelRimMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.5, roughness: 0.4 });
    var wheelWoodMat = new THREE.MeshStandardMaterial({ color: 0x6a5030, roughness: 0.8, emissive: new THREE.Color(0x2a1a08), emissiveIntensity: 0.2 });
    var wheelPositions = [[-1.3, 0.4, 0.9], [-1.3, 0.4, -0.9], [1.3, 0.4, 0.9], [1.3, 0.4, -0.9]];
    wheelPositions.forEach(function (p) {
      var wg = new THREE.Group();
      wg.position.set(p[0], p[1], p[2]);
      var disc = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.38, 0.08, 10), wheelWoodMat);
      disc.rotation.x = Math.PI / 2;
      wg.add(disc);
      var rim = new THREE.Mesh(new THREE.TorusGeometry(0.38, 0.04, 6, 12), wheelRimMat);
      wg.add(rim);
      var hub = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.12, 6), wheelRimMat);
      hub.rotation.x = Math.PI / 2;
      wg.add(hub);
      for (var si = 0; si < 6; si++) {
        var spoke = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.34, 0.03), wheelWoodMat);
        spoke.rotation.z = (si / 6) * Math.PI;
        wg.add(spoke);
      }
      g.add(wg);
    });

    // === TRAILING WAGONS — open-top supply carts ===
    for (var wi = 1; wi < cfg.wagons; wi++) {
      var tw = new THREE.Group();
      // Cart bed
      var twBed = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.15, 1.3), darkWood);
      twBed.position.y = 0.5;
      tw.add(twBed);
      // Low side walls
      var twSideGeo = new THREE.BoxGeometry(2.4, 0.35, 0.08);
      var twSL = new THREE.Mesh(twSideGeo, lightWood);
      twSL.position.set(0, 0.75, 0.65);
      tw.add(twSL);
      var twSR = twSL.clone();
      twSR.position.z = -0.65;
      tw.add(twSR);
      // Random cargo
      if (wi % 2 === 1) {
        var sack = new THREE.Mesh(new THREE.SphereGeometry(0.25, 5, 5), canvasMat);
        sack.position.set(0.2, 0.75, 0);
        sack.scale.set(1.2, 0.8, 1.0);
        tw.add(sack);
      } else {
        var twCrate = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 0.6), crateMat);
        twCrate.position.set(0, 0.75, 0);
        tw.add(twCrate);
      }
      // Wheels — solid discs matching main wagon style
      [[-0.9, 0.35, 0.75], [-0.9, 0.35, -0.75], [0.9, 0.35, 0.75], [0.9, 0.35, -0.75]].forEach(function (p) {
        var twWg = new THREE.Group();
        twWg.position.set(p[0], p[1], p[2]);
        var twDisc = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.07, 8), wheelWoodMat);
        twDisc.rotation.x = Math.PI / 2;
        twWg.add(twDisc);
        var twRim = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.03, 6, 10), wheelRimMat);
        twWg.add(twRim);
        var twHub = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.1, 6), wheelRimMat);
        twHub.rotation.x = Math.PI / 2;
        twWg.add(twHub);
        for (var tsi = 0; tsi < 5; tsi++) {
          var tSpoke = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.26, 0.025), wheelWoodMat);
          tSpoke.rotation.z = (tsi / 5) * Math.PI;
          twWg.add(tSpoke);
        }
        tw.add(twWg);
      });
      // Hitch connecting to previous wagon
      var hitch = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.05, 0.05), ropeMat);
      hitch.position.set(1.5, 0.5, 0);
      tw.add(hitch);
      tw.position.x = -wi * 3.8 - 2;
      g.add(tw);
    }

    // === LANTERN — small, subtle, on a hook at front ===
    // Lantern post
    var postMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.5, roughness: 0.4 });
    var post = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.6, 4), postMat);
    post.position.set(1.75, 1.5, 0.6);
    g.add(post);
    // Small lantern box
    var lanternBox = new THREE.Mesh(
      new THREE.BoxGeometry(0.12, 0.18, 0.12),
      new THREE.MeshBasicMaterial({ color: 0xffaa44, transparent: true, opacity: 0.7 })
    );
    lanternBox.position.set(1.75, 1.85, 0.6);
    g.add(lanternBox);
    // Subtle warm glow
    var lantern = new THREE.PointLight(0xff9933, 0.8, 6, 2);
    lantern.position.set(1.75, 1.85, 0.6);
    g.add(lantern);

    g.position.set(-60, cfg.y, cfg.z);
    scene.add(g);
    traffic.push({ type: "wagon", mesh: g, cfg: cfg, horseLegRefs: horseLegRefs });
  }

  function makeHorse(color) {
    var g = new THREE.Group();
    var mat = new THREE.MeshStandardMaterial({
      color: color, roughness: 0.65, metalness: 0.05,
      emissive: new THREE.Color(color).multiplyScalar(0.2), emissiveIntensity: 1,
    });
    var darkMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(color).multiplyScalar(0.6), roughness: 0.8,
    });

    // Barrel body
    var body = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.35, 1.6, 6), mat);
    body.rotation.z = Math.PI / 2;
    body.position.y = 0.9;
    g.add(body);

    // Chest
    var chest = new THREE.Mesh(new THREE.SphereGeometry(0.35, 5, 5), mat);
    chest.position.set(0.6, 0.95, 0);
    chest.scale.set(0.8, 0.9, 0.8);
    g.add(chest);

    // Rump
    var rump = new THREE.Mesh(new THREE.SphereGeometry(0.32, 5, 5), mat);
    rump.position.set(-0.6, 0.9, 0);
    rump.scale.set(0.8, 0.85, 0.8);
    g.add(rump);

    // Neck
    var neck = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.18, 0.7, 5), mat);
    neck.position.set(0.85, 1.25, 0);
    neck.rotation.z = 0.6;
    g.add(neck);

    // Head
    var head = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.22, 0.2), mat);
    head.position.set(1.1, 1.5, 0);
    head.rotation.z = 0.2;
    g.add(head);

    // Ears
    var earGeo = new THREE.ConeGeometry(0.05, 0.15, 4);
    var earL = new THREE.Mesh(earGeo, mat);
    earL.position.set(0.95, 1.65, 0.08);
    g.add(earL);
    var earR = earL.clone();
    earR.position.z = -0.08;
    g.add(earR);

    // Eyes
    var eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.03, 4, 4), new THREE.MeshBasicMaterial({ color: 0x222222 }));
    eyeL.position.set(1.05, 1.55, 0.1);
    g.add(eyeL);
    var eyeR = eyeL.clone();
    eyeR.position.z = -0.1;
    g.add(eyeR);

    // Mane
    var maneMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(color).multiplyScalar(0.4), roughness: 0.9 });
    var mane = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.12, 0.04), maneMat);
    mane.position.set(0.8, 1.4, 0);
    mane.rotation.z = 0.5;
    g.add(mane);

    // Tail
    var tail = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.04, 0.5, 4), darkMat);
    tail.position.set(-0.85, 1.0, 0);
    tail.rotation.z = -0.6;
    g.add(tail);

    // === LEGS — pivoted at hip/shoulder for animation ===
    var legGeo = new THREE.CylinderGeometry(0.06, 0.07, 0.55, 5);
    var hoofMat = new THREE.MeshStandardMaterial({ color: 0x2a1a0a, roughness: 0.9 });
    var hoofGeo = new THREE.CylinderGeometry(0.08, 0.09, 0.1, 5);

    var legPivots = [];
    // [x, pivotY, z] — front legs higher pivot than rear
    var legDefs = [
      { x: 0.5,  pY: 0.72, z: 0.18 },
      { x: 0.5,  pY: 0.72, z: -0.18 },
      { x: -0.5, pY: 0.72, z: 0.18 },
      { x: -0.5, pY: 0.72, z: -0.18 },
    ];
    for (var li = 0; li < legDefs.length; li++) {
      var ld = legDefs[li];
      var pivot = new THREE.Group();
      pivot.position.set(ld.x, ld.pY, ld.z);

      var legMesh = new THREE.Mesh(legGeo, darkMat);
      legMesh.position.y = -0.28;
      pivot.add(legMesh);

      var hoof = new THREE.Mesh(hoofGeo, hoofMat);
      hoof.position.y = -0.58;
      pivot.add(hoof);

      g.add(pivot);
      legPivots.push(pivot);
    }

    return { group: g, legs: legPivots };
  }

  // ─── Ogres — hunched, top-heavy, ape-like brutes ───

  function addOgre(cfg) {
    var g = new THREE.Group();
    var skinColor = new THREE.Color(cfg.color);
    var mat = new THREE.MeshStandardMaterial({
      color: skinColor, roughness: 0.65, metalness: 0.05,
      emissive: skinColor.clone().multiplyScalar(0.2), emissiveIntensity: 1,
    });
    var darkMat = new THREE.MeshStandardMaterial({
      color: skinColor.clone().multiplyScalar(0.6), roughness: 0.8, metalness: 0.05,
    });
    var bellyMat = new THREE.MeshStandardMaterial({
      color: skinColor.clone().lerp(new THREE.Color(0xaaaa77), 0.3), roughness: 0.7, metalness: 0.02,
    });

    // === UPPER BODY (hunched forward as a unit) ===
    var upper = new THREE.Group();
    upper.position.set(0, 1.1, 0);
    upper.rotation.x = 0.2;

    // Gut / belly — big sagging sphere, wider than chest
    var belly = new THREE.Mesh(new THREE.SphereGeometry(0.85, 6, 6), bellyMat);
    belly.position.set(0, 0.1, 0.15);
    belly.scale.set(1.0, 0.8, 0.9);
    upper.add(belly);

    // Chest / upper torso — broad, tapers up
    var chest = new THREE.Mesh(new THREE.SphereGeometry(0.75, 6, 6), mat);
    chest.position.set(0, 0.7, 0);
    chest.scale.set(1.2, 0.9, 0.85);
    upper.add(chest);

    // Massive shoulder hump — the signature hunched look
    var hump = new THREE.Mesh(new THREE.SphereGeometry(0.7, 5, 5), mat);
    hump.position.set(0, 1.2, -0.15);
    hump.scale.set(1.3, 0.7, 1.0);
    upper.add(hump);

    // === HEAD — oversized, sits forward on the hump ===
    var headGroup = new THREE.Group();
    headGroup.position.set(0, 1.5, 0.35);

    // Cranium — wide, flat on top
    var cranium = new THREE.Mesh(new THREE.SphereGeometry(0.6, 6, 6), mat);
    cranium.scale.set(1.1, 0.85, 0.95);
    headGroup.add(cranium);

    // Heavy brow ridge
    var brow = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.15, 0.35), darkMat);
    brow.position.set(0, 0.15, 0.35);
    headGroup.add(brow);

    // Eyes — sunken under the brow, glowing
    var eyeMat = new THREE.MeshBasicMaterial({ color: 0xff6600 });
    var eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.09, 4, 4), eyeMat);
    eyeL.position.set(0.22, 0.08, 0.5);
    headGroup.add(eyeL);
    var eyeR = eyeL.clone();
    eyeR.position.x = -0.22;
    headGroup.add(eyeR);

    // Massive jaw — protruding underbite
    var jaw = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.25, 0.45), darkMat);
    jaw.position.set(0, -0.25, 0.25);
    headGroup.add(jaw);

    // Tusks — thick, curving up from lower jaw
    var tuskMat = new THREE.MeshStandardMaterial({ color: 0xddddbb, roughness: 0.4, metalness: 0.3 });
    var tuskL = new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.35, 4), tuskMat);
    tuskL.position.set(0.25, -0.1, 0.45);
    tuskL.rotation.x = -0.5;
    tuskL.rotation.z = -0.2;
    headGroup.add(tuskL);
    var tuskR = tuskL.clone();
    tuskR.position.x = -0.25;
    tuskR.rotation.z = 0.2;
    headGroup.add(tuskR);

    upper.add(headGroup);

    // === ARMS — long, hanging down like a gorilla ===

    // Right arm pivot (shoulder joint)
    var armR = new THREE.Group();
    armR.position.set(0.85, 0.9, 0);
    armR.rotation.z = -0.15;
    // Upper arm
    var upperArmR = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.25, 1.0, 6), mat);
    upperArmR.position.y = -0.5;
    armR.add(upperArmR);

      launchVelX: 0, launchVelY: 0,
      armAngle: -0.25, armTarget: -0.25,

      REST_ANGLE: -0.25, LOADED_ANGLE: -0.5, FIRED_ANGLE: 1.2,
    });

  // ─── Animate Traffic ───

  function animateTraffic(t, dt) {
    for (var i = 0; i < traffic.length; i++) {
      var v = traffic[i];

      if (v.type === "wagon") {
        v.mesh.position.x += v.cfg.speed * dt;
        if (v.mesh.position.x > 65) v.mesh.position.x = -65;
        // Animate horse legs — trotting gait
        if (v.horseLegRefs) {
          var trot = t * 6.0;
          for (var hi = 0; hi < v.horseLegRefs.length; hi++) {
            var legs = v.horseLegRefs[hi];
            var offset = hi * 0.5;
            legs[0].rotation.z = Math.sin(trot + offset) * 0.35;
            legs[1].rotation.z = Math.sin(trot + offset + Math.PI) * 0.35;
            legs[2].rotation.z = Math.sin(trot + offset + Math.PI) * 0.35;
            legs[3].rotation.z = Math.sin(trot + offset) * 0.35;
          }
        }
      }

      if (v.type === "ogre") {
        var c = v.cfg;
        v.mesh.position.z += c.speed * dt;

        var stride = t * 3.0 + i * 2.3;
        // Heavy, slow leg swing — short bowed legs don't move much
        v.legL.rotation.x = Math.sin(stride) * 0.4;
        v.legR.rotation.x = Math.sin(stride + Math.PI) * 0.4;
        // Arms swing loose and heavy, slightly out of phase — gorilla sway
        v.armR.rotation.x = Math.sin(stride + Math.PI) * 0.35;
        v.armR.rotation.z = -0.15 + Math.sin(stride * 0.5) * 0.08;
        v.armL.rotation.x = Math.sin(stride) * 0.4;
        v.armL.rotation.z = 0.15 - Math.sin(stride * 0.5) * 0.08;
        // Heavy thudding bob
        v.mesh.position.y = Math.abs(Math.sin(stride * 2)) * 0.08;
        // Upper body rocks side to side as weight shifts between legs
        v.upper.rotation.x = 0.2 + Math.sin(stride * 2) * 0.04;
        v.upper.rotation.z = Math.sin(stride) * 0.06;

        if (c.speed > 0 && v.mesh.position.z > 14) v.mesh.position.z = -22;
        if (c.speed < 0 && v.mesh.position.z < -22) v.mesh.position.z = 14;
      }

      if (v.type === "peasant") {
        var pc = v.cfg;
        if (pc.road === "v") {
          v.mesh.position.z += pc.speed * dt;
          if (pc.speed > 0 && v.mesh.position.z > 14) v.mesh.position.z = -22;
          if (pc.speed < 0 && v.mesh.position.z < -22) v.mesh.position.z = 14;
        } else {
          v.mesh.position.x += pc.speed * dt;
          if (pc.speed > 0 && v.mesh.position.x > 65) v.mesh.position.x = -65;
          if (pc.speed < 0 && v.mesh.position.x < -65) v.mesh.position.x = 65;
        }
        var pStride = t * 5.0 + i * 3.1;
        v.legL.rotation.x = Math.sin(pStride) * 0.5;
        v.legR.rotation.x = Math.sin(pStride + Math.PI) * 0.5;
        v.armL.rotation.x = Math.sin(pStride + Math.PI) * 0.35;
        v.armR.rotation.x = Math.sin(pStride) * 0.35;
        v.mesh.position.y = Math.abs(Math.sin(pStride * 2)) * 0.02;
      }

      if (v.type === "catapult") {
        v.timer -= dt;

        // Group is rotated 180 so local X is mirrored in world space
        // Arm pivot local (-1, 5.0) → world (padX+1, 5.0)
        var pivotWorldX = v.padX + 1;
        var pivotWorldY = 5.0;
        var slingR = 5.8;

        function slingTipX(angle) { return pivotWorldX - Math.cos(angle) * slingR; }
        function slingTipY(angle) { return pivotWorldY + Math.sin(angle) * slingR; }

        if (v.state === "ready") {
          v.boulder.position.set(v.padX, -100, v.padZ);
          v.armTarget = v.REST_ANGLE;
          if (v.timer <= 0) {
            v.state = "winch";
            v.timer = 1.5;
          }
        }

        if (v.state === "winch") {
          v.armTarget = v.LOADED_ANGLE;
          v.armAngle += (v.armTarget - v.armAngle) * dt * 1.5;
          v.armPivot.parent.position.x = v.padX + (Math.random() - 0.5) * 0.03;
          if (v.timer <= 0) {
            v.armPivot.parent.position.x = v.padX;
            v.boulder.position.set(slingTipX(v.armAngle), slingTipY(v.armAngle), v.padZ);
            v.state = "countdown";
            v.timer = v.COUNTDOWN;
          }
        }

        if (v.state === "countdown") {
          v.boulder.position.set(slingTipX(v.armAngle), slingTipY(v.armAngle), v.padZ);
          v.boulder.position.x += (Math.random() - 0.5) * 0.06;
          v.armPivot.parent.position.x = v.padX + (Math.random() - 0.5) * 0.04;
          if (v.timer <= 0) {
            v.armPivot.parent.position.x = v.padX;
            v.state = "fire";
            v.timer = 0.35;
            v.armTarget = v.FIRED_ANGLE;
          }
        }

        if (v.state === "fire") {
          v.armAngle += (v.armTarget - v.armAngle) * dt * 12;
          v.boulder.position.set(slingTipX(v.armAngle), slingTipY(v.armAngle), v.padZ);

          if (v.timer <= 0) {
            v.state = "flight";
            v.timer = v.FLIGHT_TIME;
            v.launchVelX = 10;
            v.launchVelY = 16;
          }
        }

        if (v.state === "flight") {
          v.launchVelY -= 12 * dt;
          v.boulder.position.x += v.launchVelX * dt;
          v.boulder.position.y += v.launchVelY * dt;

          v.boulder.traverse(function (ch) {
            if (ch.userData._isBoulderFire) {
              ch.scale.setScalar(0.8 + Math.sin(t * 15) * 0.3);
            }
          });

          spawnSmoke(v, v.boulder.position.x, v.boulder.position.y - 0.5, v.boulder.position.z, 3, dt);

          // Arm settles back to rest with a bounce
          v.armAngle += (v.REST_ANGLE - v.armAngle) * dt * 2.5;

          if (v.boulder.position.y < -5 || v.timer <= 0) {
            v.state = "ready";
            v.timer = v.CYCLE;
            v.boulder.position.y = -100;
            v.armAngle = v.REST_ANGLE;
          }
        }

        // Apply arm rotation
        v.armPivot.rotation.z = v.armAngle;

        // Animate smoke particles
        var sp = v.smoke.geometry.attributes.position.array;
        for (var si = 0; si < v.smokeVelocities.length; si++) {
          var sv = v.smokeVelocities[si];
          if (!sv) continue;
          sp[si * 3] += sv.vx * dt;
          sp[si * 3 + 1] += sv.vy * dt;
          sp[si * 3 + 2] += sv.vz * dt;
          sv.life -= dt;
          if (sv.life <= 0) { sp[si * 3 + 1] = -100; v.smokeVelocities[si] = null; }
        }
        v.smoke.geometry.attributes.position.needsUpdate = true;
      }

    }
  }

  var _smokeIdx = 0;
  function spawnSmoke(v, x, y, z, rate, dt) {
    var count = Math.ceil(rate * dt * 10);
    var sp = v.smoke.geometry.attributes.position.array;
    var maxSmoke = sp.length / 3;
    for (var s = 0; s < count; s++) {
      var idx = _smokeIdx % maxSmoke;
      _smokeIdx++;
      sp[idx * 3] = x + (Math.random() - 0.5) * 1.0;
      sp[idx * 3 + 1] = y;
      sp[idx * 3 + 2] = z + (Math.random() - 0.5) * 1.0;
      v.smokeVelocities[idx] = {
        vx: (Math.random() - 0.5) * 3,
        vy: 1 + Math.random() * 2,
        vz: (Math.random() - 0.5) * 3,
        life: 1.5 + Math.random() * 1.5,
      };
    }
  }
