  // ─── Camera & Controls ───

  function resetToHome() {
    if (selectedDistrict || selectedGuild) return;
    orbit.userControlling = false;
    orbit.returning = true;
    orbit.dragging = false;
  }

  function updateCompassRotation() {
    var el = document.getElementById("compass-btn");
    if (!el) return;
    var deg = -(orbit.theta * 180 / Math.PI);
    var svg = el.querySelector("svg");
    if (svg) svg.style.transform = "rotate(" + deg + "deg)";
  }

  var labelSmooth = {};
  function updateLabels() {
    Object.keys(districts).forEach(function (k) {
      var el = labelEls[k];
      if (!el) return;
      var wp = districts[k].group.position.clone();
      wp.y = 7;
      var sp = wp.project(camera);
      var tx = (sp.x * 0.5 + 0.5) * container.clientWidth;
      var ty = (-sp.y * 0.5 + 0.5) * container.clientHeight;
      if (!labelSmooth[k]) { labelSmooth[k] = { x: tx, y: ty }; }
      var ls = labelSmooth[k];
      ls.x += (tx - ls.x) * 0.08;
      ls.y += (ty - ls.y) * 0.08;
      var rx = Math.round(ls.x * 10) / 10;
      var ry = Math.round(ls.y * 10) / 10;
      el.style.transform = "translate(-50%,-50%) translate(" + rx + "px," + ry + "px)";
      el.style.opacity = selectedDistrict ? "0" : "1";
    });
  }

  var _dragMoved = false;

  function onPointerDown(e) {
    if (e.button !== 0 || exploreActive) return;
    orbit.dragging = true;
    orbit.returning = false;
    orbit.startX = e.clientX;
    orbit.startY = e.clientY;
    _dragMoved = false;
    e.preventDefault();
  }

  function onPointerUp() { orbit.dragging = false; }

  function onPointerMoveDrag(e) {
    if (!orbit.dragging || !orbit.enabled || exploreActive) return;
    var dx = e.clientX - orbit.startX, dy = e.clientY - orbit.startY;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) _dragMoved = true;
    orbit.theta -= dx * 0.006;
    orbit.phi = Math.max(orbit.MIN_PHI, Math.min(orbit.MAX_PHI, orbit.phi + dy * 0.006));
    orbit.startX = e.clientX;
    orbit.startY = e.clientY;
    orbit.userControlling = true;
    orbit.idleTimer = 0;
  }

  var _hoverThrottleTimer = 0;
  function onPointerMove(e) {
    var rect = container.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    if (!orbit.dragging) {
      var now = performance.now();
      if (now - _hoverThrottleTimer > 50) {
        _hoverThrottleTimer = now;
        checkHover();
      }
    }
  }

  function onWheel(e) {
    e.preventDefault();
    if (!orbit.enabled || exploreActive) return;
    orbit.returning = false;
    orbit.radius = Math.max(orbit.MIN_RADIUS, Math.min(orbit.MAX_RADIUS, orbit.radius + e.deltaY * 0.08));
    orbit.userControlling = true;
    orbit.idleTimer = 0;
  }

  function buildHoverCache() {
    if (_hoverCacheBuilt) return;
    _bbMeshes = [];
    Object.keys(banners).forEach(function (k) {
      banners[k].traverse(function (c) { if (c.isMesh) { c.userData._bp = k; _bbMeshes.push(c); } });
    });
    _districtMeshes = [];
    Object.keys(districts).forEach(function (k) {
      districts[k].buildings.forEach(function (b) {
        b.traverse(function (c) { if (c.isMesh) { c.userData._dk = c.userData.districtId || k; _districtMeshes.push(c); } });
      });
    });
    _hoverCacheBuilt = true;
  }

  function checkHover() {
    if (selectedDistrict || (selectedGuild && selectedGuild !== "_area")) {
      renderer.domElement.style.cursor = "";
      return;
    }
    buildHoverCache();
    raycaster.setFromCamera(mouse, camera);

    if (raycaster.intersectObjects(_catMeshes, false).length) {
      if (hoveredDistrict) { hlDistrict(hoveredDistrict, false); hoveredDistrict = null; }
      hoveredBanner = null;
      renderer.domElement.style.cursor = "pointer";
      return;
    }

    var bbHits = raycaster.intersectObjects(_bbMeshes, false);
    if (bbHits.length) {
      hoveredBanner = bbHits[0].object.userData._bp || null;
      if (hoveredDistrict) { hlDistrict(hoveredDistrict, false); hoveredDistrict = null; }
      renderer.domElement.style.cursor = "pointer";
      return;
    }
    hoveredBanner = null;

    var hits = raycaster.intersectObjects(_districtMeshes, false);
    var newH = hits.length ? (hits[0].object.userData._dk || null) : null;
    if (newH !== hoveredDistrict) {
      if (hoveredDistrict) hlDistrict(hoveredDistrict, false);
      if (newH) hlDistrict(newH, true);
      hoveredDistrict = newH;
      renderer.domElement.style.cursor = newH ? "pointer" : "";
    }
  }

  function hlDistrict(id, on) {
    var d = districts[id];
    if (!d) return;
    d.buildings.forEach(function (b) {
      b.traverse(function (c) {
        if (c.isMesh && c.material && c.material.emissive) {
          c.material.emissiveIntensity = on ? 3.0 : 1;
        }
      });
    });
  }

  function onClickHandler() {
    if (_dragMoved) return;
    raycaster.setFromCamera(mouse, camera);

    if (raycaster.intersectObjects(_catMeshes, false).length) {
      triggerCatapult();
      return;
    }

    // Banner click
    if (hoveredBanner && (!selectedGuild || selectedGuild === "_area") && onBannerClick) {
      zoomToGuild(hoveredBanner);
      onBannerClick(hoveredBanner);
      return;
    }

    if (hoveredDistrict && !selectedDistrict && onDistrictClick) {
      zoomToDistrict(hoveredDistrict);
      onDistrictClick(hoveredDistrict);
    }
  }

  function triggerCatapult() {
    for (var i = 0; i < traffic.length; i++) {
      var v = traffic[i];
      if (v.type === "catapult" && v.state === "ready") {
        v.state = "countdown";
        v.timer = 0.5;
        break;
      }
    }
  }

  function zoomToDistrict(id) {
    selectedDistrict = id;
    orbit.userControlling = false;
    var cam = DISTRICT_CAMS[id];
    if (cam) {
      targetCamPos.copy(cam.pos);
      targetCamLook.copy(cam.look);
      orbit.target.copy(cam.look);
      var dx = cam.pos.x - cam.look.x, dy = cam.pos.y - cam.look.y, dz = cam.pos.z - cam.look.z;
      orbit.radius = Math.sqrt(dx * dx + dy * dy + dz * dz);
      orbit.phi = Math.acos(dy / orbit.radius);
      orbit.theta = Math.atan2(dx, dz);
    }
    hlDistrict(id, true);
  }

  function zoomToOverview() {
    if (selectedDistrict) hlDistrict(selectedDistrict, false);
    selectedDistrict = null;
    selectedGuild = null;
    hoveredDistrict = null;
    hoveredBanner = null;
    orbit.userControlling = false;
    orbit.target.copy(OVERVIEW.look);
    var dx = OVERVIEW.pos.x - OVERVIEW.look.x, dy = OVERVIEW.pos.y - OVERVIEW.look.y, dz = OVERVIEW.pos.z - OVERVIEW.look.z;
    orbit.radius = Math.sqrt(dx * dx + dy * dy + dz * dz);
    orbit.phi = Math.acos(dy / orbit.radius);
    orbit.theta = Math.atan2(dx, dz);
    targetCamPos.copy(OVERVIEW.pos);
    targetCamLook.copy(OVERVIEW.look);
  }

  function zoomToGuildArea() {
    selectedGuild = "_area";
    selectedDistrict = null;
    orbit.userControlling = false;
    var cam = GUILD_AREA_CAM;
    orbit.target.copy(cam.look);
    var dx = cam.pos.x - cam.look.x, dy = cam.pos.y - cam.look.y, dz = cam.pos.z - cam.look.z;
    orbit.radius = Math.sqrt(dx * dx + dy * dy + dz * dz);
    orbit.phi = Math.acos(dy / orbit.radius);
    orbit.theta = Math.atan2(dx, dz);
    targetCamPos.copy(cam.pos);
    targetCamLook.copy(cam.look);
  }

  function zoomToGuild(guildId) {
    selectedGuild = guildId;
    orbit.userControlling = false;
    var cam = GUILD_CAMS[guildId];
    if (cam) {
      orbit.target.copy(cam.look);
      var dx = cam.pos.x - cam.look.x, dy = cam.pos.y - cam.look.y, dz = cam.pos.z - cam.look.z;
      orbit.radius = Math.sqrt(dx * dx + dy * dy + dz * dz);
      orbit.phi = Math.acos(dy / orbit.radius);
      orbit.theta = Math.atan2(dx, dz);
      targetCamPos.copy(cam.pos);
      targetCamLook.copy(cam.look);
    }
  }

  // ─── Main Animation Loop ───

  var _idle = 0;
  function animate() {
    animId = requestAnimationFrame(animate);
    var dt = Math.min(clock.getDelta(), 0.05);
    var t = clock.getElapsedTime();

    // Explore mode camera
    if (exploreActive) {
      updateExplore(dt, t);
    }

    // Camera logic (same as original)
    else if (orbit.userControlling) {
      orbit.idleTimer += dt;
      camera.position.copy(orbitToPosition());
      camera.lookAt(orbit.target);
      currentCamLook.copy(orbit.target);
      targetCamPos.copy(camera.position);
      targetCamLook.copy(orbit.target);
      if (orbit.idleTimer > orbit.IDLE_RESUME && !selectedDistrict && !orbit.dragging) {
        orbit.userControlling = false;
        orbit.returning = true;
      }
    } else if (orbit.returning) {
      var ls = dt * 2.5;
      orbit.theta += (orbit.HOME_THETA - orbit.theta) * ls;
      orbit.phi += (orbit.HOME_PHI - orbit.phi) * ls;
      orbit.radius += (orbit.HOME_RADIUS - orbit.radius) * ls;
      orbit.target.lerp(OVERVIEW.look, ls);
      var op = orbitToPosition();
      camera.position.lerp(op, ls * 2);
      camera.lookAt(orbit.target);
      currentCamLook.copy(orbit.target);
      targetCamPos.copy(op);
      targetCamLook.copy(orbit.target);
      if (Math.abs(orbit.theta - orbit.HOME_THETA) < 0.005 && Math.abs(orbit.phi - orbit.HOME_PHI) < 0.005 && Math.abs(orbit.radius - orbit.HOME_RADIUS) < 0.1) {
        orbit.theta = orbit.HOME_THETA;
        orbit.phi = orbit.HOME_PHI;
        orbit.radius = orbit.HOME_RADIUS;
        orbit.returning = false;
        _idle = orbit.HOME_THETA;
      }
    } else if (selectedDistrict || selectedGuild) {
      camera.position.lerp(targetCamPos, dt * 2.5);
      currentCamLook.lerp(targetCamLook, dt * 2.5);
      camera.lookAt(currentCamLook);
    } else {
      _idle += dt * 0.08;
      orbit.theta = _idle;
      var op = orbitToPosition();
      camera.position.lerp(op, dt * 2.0);
      camera.lookAt(orbit.target);
      currentCamLook.copy(orbit.target);
      targetCamPos.copy(op);
      targetCamLook.copy(orbit.target);
    }

    updateCompassRotation();

    // Fireflies drift
    if (particles) {
      var pa = particles.geometry.attributes.position.array;
      for (var i = 0; i < pa.length; i += 3) {
        pa[i] += Math.sin(t * 0.3 + i * 0.05) * 0.003;
        pa[i + 1] += Math.sin(t * 0.4 + i * 0.08) * 0.002;
        if (pa[i + 1] > 30) pa[i + 1] = 0.3;
      }
      particles.geometry.attributes.position.needsUpdate = true;
      particles.material.opacity = 0.35 + Math.sin(t * 0.8) * 0.15;
    }

    // Star twinkle — per-star shimmer
    if (stars && starPhases && starBaseSizes) {
      var sa = stars.geometry.attributes.position.array;
      for (var si = 0; si < starPhases.length; si++) {
        var twinkle = Math.sin(t * (2.0 + (si % 7) * 0.5) + starPhases[si]);
        var brightness = twinkle > 0.7 ? 1.5 : (twinkle > 0.3 ? 1.0 : 0.6);
        sa[si * 3 + 1] += Math.sin(t * 0.1 + starPhases[si]) * 0.002 * brightness;
      }
      stars.geometry.attributes.position.needsUpdate = true;
      stars.material.opacity = 0.7 + Math.sin(t * 0.5) * 0.15;
      stars.material.size = 0.9 + Math.sin(t * 1.5) * 0.15;
    }

    animateTraffic(t, dt);
    updateBannerFade(dt);

    // Animate cached objects (no scene.traverse needed)
    for (var ai = 0; ai < _animObjs.length; ai++) {
      var obj = _animObjs[ai];
      if (obj.userData._isBeacon) {
        obj.material.opacity = 0.45 + Math.sin(t * 3) * 0.45;
      }
      if (obj.userData._isRing) {
        obj.rotation.z = t * (0.4 + obj.userData._ringIdx * 0.2);
        obj.material.opacity = 0.15 + Math.sin(t * 2 + obj.userData._ringIdx * 1.5) * 0.1;
      }
      if (obj.userData._isCrystal) {
        obj.rotation.y = t * 0.5;
        var s = 1 + Math.sin(t * 2) * 0.1;
        obj.scale.set(s, s, s);
      }
      if (obj.userData._isFlag) {
        obj.rotation.y = Math.sin(t * 2 + obj.position.x) * 0.15;
      }
      if (obj.userData._isTorchFlame) {
        var flicker = 0.7 + Math.sin(t * 8 + obj.id * 3) * 0.2 + Math.sin(t * 13 + obj.id * 7) * 0.1;
        obj.material.opacity = flicker;
        var fs = 0.8 + Math.sin(t * 10 + obj.id) * 0.3;
        obj.scale.setScalar(fs);
      }
      if (obj.userData._isCampFlame) {
        var fi = obj.userData._flameIdx || 0;
        var sway = Math.sin(t * 5 + fi * 2) * 0.08;
        obj.position.x += sway * 0.01;
        obj.scale.set(
          0.8 + Math.sin(t * 7 + fi) * 0.3,
          0.9 + Math.sin(t * 6 + fi * 1.5) * 0.25,
          0.8 + Math.cos(t * 8 + fi) * 0.3
        );
        obj.material.opacity = 0.7 + Math.sin(t * 9 + fi * 3) * 0.25;
      }
    }

    updateLabels();
    renderer.render(scene, camera);
  }

  var sfxDeathSounds = [sfx_death1, sfx_death2, sfx_death3];
  var sfxOgreSounds = [sfx_ogreDeath1, sfx_ogreDeath2];
  var sfxClingSounds = [sfx_cling1, sfx_cling2];
  var sfxMuted = false;
  function playRandSfx(arr) { if (sfxMuted) return; var s = arr[Math.floor(Math.random() * arr.length)]; s.currentTime = 0; s.play().catch(function () {}); }

  function spawnSmokePoof(x, y, z) {
    var count = 25;
    var geo = new THREE.BufferGeometry();
    var pos = new Float32Array(count * 3);
    for (var i = 0; i < count; i++) {
      pos[i * 3] = x + (Math.random() - 0.5) * 0.6;
      pos[i * 3 + 1] = y + Math.random() * 0.3;
      pos[i * 3 + 2] = z + (Math.random() - 0.5) * 0.6;
    }
    geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
    var mat = new THREE.PointsMaterial({
      color: 0xccccaa, size: 0.7, transparent: true, opacity: 1.0,
      depthWrite: false, fog: false,
    });
    var pts = new THREE.Points(geo, mat);
    scene.add(pts);
    var vels = [];
    for (var i = 0; i < count; i++) {
      vels.push({
        vx: (Math.random() - 0.5) * 3,
        vy: 1.5 + Math.random() * 3,
        vz: (Math.random() - 0.5) * 3,
      });
    }
    smokePoofs.push({ pts: pts, vels: vels, life: 1.8 });
  }

  function updateSmokePoofs(dt) {
    for (var i = smokePoofs.length - 1; i >= 0; i--) {
      var pf = smokePoofs[i];
      pf.life -= dt;
      if (pf.life <= 0) {
        scene.remove(pf.pts);
        pf.pts.geometry.dispose();
        pf.pts.material.dispose();
        smokePoofs.splice(i, 1);
        continue;
      }
      pf.pts.material.opacity = Math.min(1.0, pf.life / 0.6);
      var arr = pf.pts.geometry.attributes.position.array;
      for (var j = 0; j < pf.vels.length; j++) {
        arr[j * 3] += pf.vels[j].vx * dt;
        arr[j * 3 + 1] += pf.vels[j].vy * dt;
        arr[j * 3 + 2] += pf.vels[j].vz * dt;
        pf.vels[j].vy -= 1.5 * dt;
      }
      pf.pts.geometry.attributes.position.needsUpdate = true;
    }
  }

  function registerKill(type) {
    killCount++;
    var pts = type === "ogre" ? 50 : 10;
    killScore += pts;

    var numEl = document.getElementById("kill-num");
    var ptsEl = document.getElementById("kill-pts");
    var ctr = document.getElementById("kill-counter");
    var flash = document.getElementById("kill-flash");
    if (numEl) numEl.textContent = killCount;
    if (ptsEl) ptsEl.textContent = killScore + " pts";

    if (ctr) { ctr.classList.add("bump"); setTimeout(function () { ctr.classList.remove("bump"); }, 150); }
    if (flash) {
      flash.textContent = "+" + pts + (type === "ogre" ? "  ⚔️" : "  💀");
      flash.style.opacity = "1";
      flash.style.transform = "translate(-50%, -50%) scale(1.2)";
      setTimeout(function () {
        flash.style.opacity = "0";
        flash.style.transform = "translate(-50%, -70%) scale(0.8)";
      }, 600);
    }
  }

  function checkSwordHits() {
    if (!playerMesh) return;
    var px = playerMesh.position.x;
    var pz = playerMesh.position.z;
    var fwdX = Math.sin(playerMesh.rotation.y);
    var fwdZ = Math.cos(playerMesh.rotation.y);
    var hitRange = 2.0;

    for (var i = traffic.length - 1; i >= 0; i--) {
      var v = traffic[i];
      if (v.type !== "ogre" && v.type !== "peasant") continue;
      var mx = v.mesh.position.x;
      var mz = v.mesh.position.z;
      var dx = mx - px;
      var dz = mz - pz;
      var dist = Math.sqrt(dx * dx + dz * dz);
      if (dist > hitRange) continue;
      var dot = dx * fwdX + dz * fwdZ;
      if (dot < 0) continue;

      var h = v.type === "ogre" ? 2.0 : 0.6;
      spawnSmokePoof(mx, h * 0.5, mz);
      scene.remove(v.mesh);
      registerKill(v.type);
      playRandSfx(v.type === "ogre" ? sfxOgreSounds : sfxDeathSounds);
      traffic.splice(i, 1);
      swordHitThisSwing = true;
    }

    for (var i = _campfirePeasants.length - 1; i >= 0; i--) {
      var cp = _campfirePeasants[i];
      var dx = cp.wx - px;
      var dz = cp.wz - pz;
      var dist = Math.sqrt(dx * dx + dz * dz);
      if (dist > hitRange) continue;
      var dot = dx * fwdX + dz * fwdZ;
      if (dot < 0) continue;

      spawnSmokePoof(cp.wx, 0.3, cp.wz);
      cp.parent.remove(cp.group);
      registerKill("peasant");
      playRandSfx(sfxDeathSounds);
      _campfirePeasants.splice(i, 1);
      swordHitThisSwing = true;
    }

    // Tree chopping
    var treeHitRange = 2.5;
    var zeroM = new THREE.Matrix4().makeScale(0, 0, 0).setPosition(0, -1000, 0);
    for (var i = 0; i < _treePositions.length; i++) {
      var tp = _treePositions[i];
      if (!tp.alive) continue;
      var dx = tp.x - px;
      var dz = tp.z - pz;
      var dist = Math.sqrt(dx * dx + dz * dz);
      if (dist > treeHitRange) continue;
      var dot = dx * fwdX + dz * fwdZ;
      if (dot < 0) continue;

      tp.alive = false;
      spawnSmokePoof(tp.x, tp.h * 0.4, tp.z);
      _treeIMs.trunk.setMatrixAt(i, zeroM);
      _treeIMs.f1.setMatrixAt(i, zeroM);
      _treeIMs.f2.setMatrixAt(i, zeroM);
      _treeIMs.f3.setMatrixAt(i, zeroM);
      _treeIMs.trunk.instanceMatrix.needsUpdate = true;
      _treeIMs.f1.instanceMatrix.needsUpdate = true;
      _treeIMs.f2.instanceMatrix.needsUpdate = true;
      _treeIMs.f3.instanceMatrix.needsUpdate = true;
      spawnLogs(tp.x, tp.z);
      playRandSfx(sfxClingSounds);
      swordHitThisSwing = true;
    }

    // Building / wagon cling — swing near a building or wagon
    if (!swordHitThisSwing) {
      for (var bi = 0; bi < _buildingBoxes.length; bi++) {
        var bb = _buildingBoxes[bi];
        var bdx = bb.x - px;
        var bdz = bb.z - pz;
        var bdist = Math.sqrt(bdx * bdx + bdz * bdz);
        if (bdist > 3.0) continue;
        var bdot = bdx * fwdX + bdz * fwdZ;
        if (bdot < 0) continue;
        playRandSfx(sfxClingSounds);
        swordHitThisSwing = true;
        break;
      }
    }
    if (!swordHitThisSwing) {
      for (var wi = 0; wi < traffic.length; wi++) {
        if (traffic[wi].type !== "wagon") continue;
        var wm = traffic[wi].mesh;
        var wdx = wm.position.x - px;
        var wdz = wm.position.z - pz;
        var wdist = Math.sqrt(wdx * wdx + wdz * wdz);
        if (wdist > 3.0) continue;
        var wdot = wdx * fwdX + wdz * fwdZ;
        if (wdot < 0) continue;
        playRandSfx(sfxClingSounds);
        swordHitThisSwing = true;
        break;
      }
    }
  }

  function enterExploreMode() {
    if (exploreActive) return;
    exploreActive = true;

    if (!playerMesh) playerMesh = createPlayerCharacter();

    playerMesh.position.set(-43, 0, 4.5);
    playerMesh.visible = true;
    playerYaw = 0;
    exploreCamTheta = Math.PI;
    exploreCamPhi = 0.45;
    exploreCamDist = 4.5;
    exploreKeys = {};
    killCount = 0;
    killScore = 0;
    playerHealth = 100;
    playerDead = false;
    playerJumpY = 0;
    playerJumpVel = 0;
    playerIsJumping = false;

    // Attach explore-specific key handlers
    window.addEventListener("keydown", onExploreKeyDown);
    window.addEventListener("keyup", onExploreKeyUp);
    container.addEventListener("mousedown", onExploreMDown);
    window.addEventListener("mouseup", onExploreMUp);
    window.addEventListener("mousemove", onExploreMMove);
  }

  function exitExploreMode() {
    if (!exploreActive) return;
    exploreActive = false;
    if (playerMesh) playerMesh.visible = false;
    exploreKeys = {};

    window.removeEventListener("keydown", onExploreKeyDown);
    window.removeEventListener("keyup", onExploreKeyUp);
    container.removeEventListener("mousedown", onExploreMDown);
    window.removeEventListener("mouseup", onExploreMUp);
    window.removeEventListener("mousemove", onExploreMMove);

    orbit.userControlling = false;
    orbit.returning = true;
  }

  function onExploreKeyDown(e) {
    var k = e.key === " " ? " " : e.key.toLowerCase();
    exploreKeys[k] = true;
    if (e.key === "Escape") exitExploreMode();
    if (e.key === " ") e.preventDefault();
  }
  function onExploreKeyUp(e) {
    var k = e.key === " " ? " " : e.key.toLowerCase();
    exploreKeys[k] = false;
  }
  var _exploreDragDist = 0;
  function onExploreMDown(e) {
    if (e.button === 2) {
      exploreDragging = true;
      exploreLastMX = e.clientX;
      exploreLastMY = e.clientY;
      _exploreDragDist = 0;
      e.preventDefault();
    } else if (e.button === 0) {
      exploreDragging = true;
      exploreLastMX = e.clientX;
      exploreLastMY = e.clientY;
      _exploreDragDist = 0;
      e.preventDefault();
    }
  }
  function onExploreMUp(e) {
    if (exploreDragging && e.button === 0 && _exploreDragDist < 6) {
      if (!swordSwinging) {
        swordSwinging = true;
        swordSwingTimer = 0;
        swordHitThisSwing = false;
      }
    }
    exploreDragging = false;
  }
  function onExploreMMove(e) {
    if (!exploreDragging) return;
    var dx = e.clientX - exploreLastMX;
    var dy = e.clientY - exploreLastMY;
    _exploreDragDist += Math.abs(dx) + Math.abs(dy);
    exploreLastMX = e.clientX;
    exploreLastMY = e.clientY;
    exploreCamTheta -= dx * 0.005;
    exploreCamPhi = Math.max(0.15, Math.min(1.2, exploreCamPhi - dy * 0.005));
  }

  function updateExplore(dt, t) {
    if (!exploreActive || !playerMesh) return;
    if (playerDead) return;

    // Jump
    if (exploreKeys[" "] && !playerIsJumping) {
      playerIsJumping = true;
      playerJumpVel = 8.0;
      if (!sfxMuted) { jumpSfx.currentTime = 0; jumpSfx.play().catch(function () {}); }
    }
    if (playerIsJumping) {
      playerJumpY += playerJumpVel * dt;
      playerJumpVel -= 22.0 * dt;
      if (playerJumpY <= 0) { playerJumpY = 0; playerIsJumping = false; playerJumpVel = 0; }
    }

    // Movement relative to camera facing direction
    var moveSpeed = 6.0;
    var moveX = 0, moveZ = 0;
    if (exploreKeys["w"]) moveZ += 1;
    if (exploreKeys["s"]) moveZ -= 1;
    if (exploreKeys["a"]) moveX -= 1;
    if (exploreKeys["d"]) moveX += 1;

    var isMoving = (moveX !== 0 || moveZ !== 0);

    if (isMoving) {
      var camFwd = exploreCamTheta;
      var mx = Math.sin(camFwd) * moveZ + Math.sin(camFwd - Math.PI / 2) * moveX;
      var mz = Math.cos(camFwd) * moveZ + Math.cos(camFwd - Math.PI / 2) * moveX;
      var len = Math.sqrt(mx * mx + mz * mz);
      if (len > 0) { mx /= len; mz /= len; }

      var newX = playerMesh.position.x + mx * moveSpeed * dt;
      var newZ = playerMesh.position.z + mz * moveSpeed * dt;

      // Building collision
      var blocked = false;
      for (var bi = 0; bi < _buildingBoxes.length; bi++) {
        var bb = _buildingBoxes[bi];
        if (newX > bb.x - bb.hw && newX < bb.x + bb.hw && newZ > bb.z - bb.hd && newZ < bb.z + bb.hd) {
          blocked = true; break;
        }
      }
      if (!blocked) {
        playerMesh.position.x = newX;
        playerMesh.position.z = newZ;
      }

      // Clamp to world bounds
      playerMesh.position.x = Math.max(-68, Math.min(68, playerMesh.position.x));
      playerMesh.position.z = Math.max(-40, Math.min(20, playerMesh.position.z));

      playerYaw = Math.atan2(mx, mz);
      playerMesh.rotation.y = playerYaw;
    }

    // Walking animation
    var walkT = isMoving ? t * 6.0 : 0;
    var walkSwing = isMoving ? 0.45 : 0;
    playerMesh.userData._playerLegL.rotation.x = Math.sin(walkT) * walkSwing;
    playerMesh.userData._playerLegR.rotation.x = Math.sin(walkT + Math.PI) * walkSwing;
    playerMesh.userData._playerArmL.rotation.x = Math.sin(walkT + Math.PI) * walkSwing * 0.6;
    var walkBob = isMoving ? Math.abs(Math.sin(walkT * 2)) * 0.03 : 0;
    playerMesh.position.y = playerJumpY + walkBob;

    // Fire damage — check campfire proximity
    var _cfSpots = [[-41, 3], [-15, -3], [-41, -5], [-15, 6]];
    var inFire = false;
    for (var fi = 0; fi < _cfSpots.length; fi++) {
      var fd = Math.sqrt(Math.pow(playerMesh.position.x - _cfSpots[fi][0], 2) + Math.pow(playerMesh.position.z - _cfSpots[fi][1], 2));
      if (fd < 1.0) { inFire = true; break; }
    }
    var dmgFlash = document.getElementById("damage-flash");
    if (inFire) {
      playerHealth -= 30 * dt;
      if (dmgFlash) dmgFlash.style.opacity = "0.5";
    } else {
      if (dmgFlash) dmgFlash.style.opacity = "0";
    }
    var hbInner = document.getElementById("health-bar-inner");
    if (hbInner) hbInner.style.width = Math.max(0, playerHealth) + "%";

    if (playerHealth <= 0 && !playerDead) {
      playerDead = true;
      var ds = document.getElementById("death-screen");
      if (ds) ds.classList.add("visible");
    }

    // Sword slash animation — wind up behind, slash forward
    var armR = playerMesh.userData._playerArmR;
    if (swordSwinging) {
      swordSwingTimer += dt;
      var dur = 0.5;
      var p = swordSwingTimer / dur;
      if (p < 0.2) {
        // Wind-up: arm goes UP and BEHIND character
        var e1 = p / 0.2;
        var ease1 = e1 * e1;
        armR.rotation.x = 2.0 * ease1;
        armR.rotation.z = -0.6 * ease1;
        armR.rotation.y = 0.3 * ease1;
      } else if (p < 0.45) {
        // SLASH: arm swings DOWN and FORWARD, stops at horizontal
        var e2 = (p - 0.2) / 0.25;
        var ease2 = 1 - (1 - e2) * (1 - e2);
        armR.rotation.x = 2.0 - 2.2 * ease2;
        armR.rotation.z = -0.6 + 0.8 * ease2;
        armR.rotation.y = 0.3 - 0.4 * ease2;
      } else if (p < 1.0) {
        // Recovery — ease from end-of-slash back to neutral
        var e3 = (p - 0.45) / 0.55;
        var ease3 = e3 * e3;
        armR.rotation.x = -0.2 * (1 - ease3);
        armR.rotation.z = 0.2 * (1 - ease3);
        armR.rotation.y = -0.1 * (1 - ease3);
      } else {
        swordSwinging = false;
        swordSwingTimer = 0;
        armR.rotation.x = 0;
        armR.rotation.z = 0;
        armR.rotation.y = 0;
      }

      // Check for hits on ogres/peasants during the slash phase
      if (p >= 0.2 && p < 0.5 && !swordHitThisSwing) {
        checkSwordHits();
      }
    } else {
      armR.rotation.x = Math.sin(walkT) * walkSwing * 0.6;
      armR.rotation.z = 0;
      armR.rotation.y = 0;
    }

    // Update smoke poofs from sword kills
    updateSmokePoofs(dt);

    // Third-person camera
    var cx = playerMesh.position.x - Math.sin(exploreCamTheta) * Math.cos(exploreCamPhi) * exploreCamDist;
    var cy = playerMesh.position.y + 1.0 + Math.sin(exploreCamPhi) * exploreCamDist;
    var cz = playerMesh.position.z - Math.cos(exploreCamTheta) * Math.cos(exploreCamPhi) * exploreCamDist;

    camera.position.set(cx, cy, cz);
    camera.lookAt(
      playerMesh.position.x,
      playerMesh.position.y + 0.7,
      playerMesh.position.z
    );
  }

  return {
    init: init,
    zoomToDistrict: zoomToDistrict,
    zoomToOverview: zoomToOverview,
    zoomToGuildArea: zoomToGuildArea,
    zoomToGuild: zoomToGuild,
    showBanners: showBanners,
    hideBanners: hideBanners,

    toggleSfxMute: function () { sfxMuted = !sfxMuted; },
    isSfxMuted: function () { return sfxMuted; },
  };
})();

        title: "🏹 MANIFEST.in — The Ranger's Map",
        text: "The Ranger's Map determines which paths are protected by the Royal Seal. MANIFEST.in is a file at the root of thy project that declares which files should be included in the signature checksum — and which should be excluded.\n\nChart the map:\n  include playbooks/*.yml\n  include roles/**\n  include collections/requirements.yml\n  global-exclude *.pyc\n  global-exclude .git/**\n  prune .tox\n  prune __pycache__\n\nWhen ansible-sign computes the SHA256 checksums for signing, it follows this map exactly. Including too little means tampering goes undetected. Including too much means legitimate changes (like .pyc files) break verification. The Ranger's Map requires the precision of an expert tracker."
      },
      gpg: {
        title: "🛡️ GPG Keys — The Ranger's Sigil",
        text: "Every ranger carries a unique sigil — a mark that proves their identity. GPG (GNU Privacy Guard) keys are the cryptographic foundation of ansible-sign. Thy private key signs the project manifest; thy public key lets others verify the seal.\n\nForge thy sigil:\n  gpg --batch --gen-key <<EOF\n  %no-protection\n  Key-Type: RSA\n  Key-Length: 4096\n  Name-Real: Ansible Ranger\n  Name-Email: ranger@kingdom.io\n  EOF\n\n  gpg --list-secret-keys               (verify the sigil)\n  ansible-sign project gpg-sign .      (apply the sigil)\n  ansible-sign project gpg-verify .    (verify another's sigil)\n\nIn Ansible Automation Platform, register thy public key as a credential. When projects sync from Git, AAP verifies the GPG signature automatically — ensuring no impostor has tampered with thy code."
      },
    },
  };

  function buildGuildMenu(guildId) {
    var menuItems = document.getElementById("guild-menu-items");
    menuItems.innerHTML = "";
    var items = guildMenuItems[guildId] || [];
    items.forEach(function (item) {
      var btn = document.createElement("div");
      btn.className = "guild-menu-btn";
      btn.textContent = item.label;
      btn.addEventListener("click", function () {
        var wasOn = this.classList.contains("on");
        menuItems.querySelectorAll(".guild-menu-btn").forEach(function (el) { el.classList.remove("on"); });
        if (!wasOn) {
          this.classList.add("on");
          showGuildInfo(guildId, item);
        } else {
          hideInfoOverlay();
        }
      });
      menuItems.appendChild(btn);
    });
  }

  function showGuildInfo(guildId, item) {
    var data = guildInfoData[guildId] && guildInfoData[guildId][item.key];
    if (data) {
      document.getElementById("info-title").textContent = data.title;
      document.getElementById("info-text").textContent = data.text;
    } else {
      var guild = guildData[guildId];
      document.getElementById("info-title").textContent = guild.name + " — " + item.label;
      document.getElementById("info-text").textContent = "Details coming soon...";
    }
    document.getElementById("info-overlay").classList.add("visible");
    document.getElementById("overlay-close-btn").classList.add("visible");
  }

  function deactivateGuild() {
    currentGuildId = null;
    guildAreaActive = false;
    hideInfoOverlay();
    document.getElementById("guild-heading").classList.remove("visible");
    document.getElementById("guild-menu").classList.remove("visible");
    document.getElementById("guild-menu").classList.add("hidden");
    document.getElementById("bottom-menu").classList.remove("visible");
    MedievalKingdom.hideBanners();
  }

  function goHome() {
    document.getElementById("page-heading").classList.remove("visible");
    document.getElementById("bottom-menu").classList.remove("visible");
    document.getElementById("main-menu").classList.remove("visible");
    deactivateGuild();
    hideInfoOverlay();

    setTimeout(function () {
      document.getElementById("landingPage").classList.remove("hidden");
      document.getElementById("realm-header").classList.remove("hidden");
      document.getElementById("explore-btn").style.display = "";
      currentDistrictId = null;
      MedievalKingdom.zoomToOverview();
    }, 400);
  }
})();
    </script>
